//  CRM LIST 
function LeadCRM(props){
  var onBack=props&&props.onBack;
  var user=props&&props.user;
  var [leads,setLeads]=useState(LEADS_DATA);
  var [filter,setFilter]=useState("All");
  var [search,setSearch]=useState("");
  var [selected,setSelected]=useState(null);
  var [showAdd,setShowAdd]=useState(false);
  var [sortBy,setSortBy]=useState("score");
  var [activeTile,setActiveTile]=useState(null);
  var [notifs,setNotifs]=useState(INIT_NOTIFS);
  var [showFilters,setShowFilters]=useState(false);
  var [activeFilters,setActiveFilters]=useState({});
  var [qualifyingLead,setQualifyingLead]=useState(null);
  var hasActiveFilters=Object.keys(activeFilters).filter(function(k){return activeFilters[k]&&activeFilters[k]!=="";}).length>0;

  var bizNumber=(function(){
    if(!user||!user.email) return "+91 80 4718 2020";
    var h=0; for(var i=0;i<user.email.length;i++){h=(h*31+user.email.charCodeAt(i))>>>0;}
    var digits=String(h).slice(0,4).padStart(4,"0");
    return "+91 80 47"+digits.slice(0,2)+" "+digits.slice(2,4)+"00";
  })();

  var statusCounts={};
  leads.forEach(function(l){statusCounts[l.status]=(statusCounts[l.status]||0)+1;});
  var hotL=leads.filter(function(l){return l.score>=80;});
  var warmL=leads.filter(function(l){return l.score>=55&&l.score<80;});
  var coldL=leads.filter(function(l){return l.score<55;});
  var apptL=leads.filter(function(l){return l.status==="Appointment";});
  var closedL=leads.filter(function(l){return l.status==="Closed";});

  var TILES=[
    {key:"hot",label:" Hot",count:hotL.length,color:"#34D399",leads:hotL},
    {key:"warm",label:"* Warm",count:warmL.length,color:"#F0C060",leads:warmL},
    {key:"cold",label:"[cold] Cold",count:coldL.length,color:"#F87171",leads:coldL},
    {key:"appt",label:" Appts",count:apptL.length,color:"#A78BFA",leads:apptL},
    {key:"closed",label:" Closed",count:closedL.length,color:"#6EE7F7",leads:closedL},
  ];

  var FILTERS=["All","New","AI Calling","Qualified","Appointment","Closed","Not Responding","Fake","Budget Issue","Wrong Number"];

  var filtered=leads.filter(function(l){
    if(activeTile){var t=TILES.find(function(x){return x.key===activeTile;});if(t&&!t.leads.find(function(x){return x.id===l.id;}))return false;}
    else if(filter!=="All"&&l.status!==filter)return false;
    if(search&&l.name.toLowerCase().indexOf(search.toLowerCase())<0&&l.phone.indexOf(search)<0)return false;
    // Active filters
    if(activeFilters.status&&l.status!==activeFilters.status)return false;
    if(activeFilters.source&&l.source!==activeFilters.source)return false;
    if(activeFilters.rating){
      var stars=activeFilters.rating;
      var minScore=(parseInt(stars)-1)*20;
      var maxScore=parseInt(stars)*20;
      if(l.score<minScore||l.score>=maxScore)return false;
    }
    if(activeFilters.dateFrom){
      var df=new Date(activeFilters.dateFrom);
      if(isNaN(df.getTime())||new Date(l.createdAt)<df)return false;
    }
    if(activeFilters.dateTo){
      var dt=new Date(activeFilters.dateTo);
      if(isNaN(dt.getTime())||new Date(l.createdAt)>dt)return false;
    }
    if(activeFilters.followupDate==="done"&&!l.followupDone)return false;
    if(activeFilters.followupDate==="pending"&&l.followupDone)return false;
    if(activeFilters.eventFrom){
      if(!l.eventDate)return false;
      var ef=new Date(activeFilters.eventFrom);
      if(isNaN(ef.getTime())||new Date(l.eventDate)<ef)return false;
    }
    if(activeFilters.eventTo){
      if(!l.eventDate)return false;
      var et=new Date(activeFilters.eventTo);
      if(isNaN(et.getTime())||new Date(l.eventDate)>et)return false;
    }
    if(activeFilters.closureFrom){
      if(!l.expectedClosureDate)return false;
      var cf=new Date(activeFilters.closureFrom);
      if(isNaN(cf.getTime())||new Date(l.expectedClosureDate)<cf)return false;
    }
    if(activeFilters.closureTo){
      if(!l.expectedClosureDate)return false;
      var ct=new Date(activeFilters.closureTo);
      if(isNaN(ct.getTime())||new Date(l.expectedClosureDate)>ct)return false;
    }
    return true;
  }).sort(function(a,b){
    if(sortBy==="score") return b.score-a.score;
    if(sortBy==="name") return a.name.localeCompare(b.name);
    if(sortBy==="date") return new Date(b.createdAt)-new Date(a.createdAt);
    return 0;
  });

  function handleAdd(form){
    var n=Object.assign({},form,{id:Date.now(),score:50,transcript:[],followupLog:[],activities:[{type:"status",text:"Lead added -- AI qualification call starting from "+bizNumber,time:"Just now",color:"#6EE7F7"}],tags:["New"],createdAt:new Date().toLocaleDateString("en-IN",{month:"short",day:"numeric",year:"numeric"}),followupDone:false,aiQualification:null,status:"AI Calling"});
    setLeads(function(p){return [n].concat(p);});
    setNotifs(function(ns){return [{id:Date.now(),text:"New lead "+form.name+" added -- AI calling now for qualification",time:"Just now",color:"#F0C060",read:false}].concat(ns);});
    setQualifyingLead(n);
  }

  function handleQualificationComplete(leadId,result,callLog,elapsed){
    var mins=Math.floor((elapsed||0)/60), secs=(elapsed||0)%60;
    var transcriptEntry={id:Date.now(),type:"call",summary:"AI qualification call -- "+mins+"m "+(secs<10?"0":"")+secs+"s. Result: "+result.result+" (score "+result.score+"). "+result.reason,time:"Just now",outcome:result.result};
    setLeads(function(p){return p.map(function(l){
      if(l.id!==leadId) return l;
      var u=Object.assign({},l,{score:result.score,status:result.result,aiQualification:{result:result.result,reason:result.reason},followupLog:[transcriptEntry].concat(l.followupLog||[])});
      u.activities=[{type:"status",text:"AI qualification complete -- "+result.result+" ("+result.score+"/100)",time:"Just now",color:STATUS_CONFIG[result.result]?STATUS_CONFIG[result.result].color:"#6EE7F7"}].concat(l.activities||[]);
      return u;
    });});
    setNotifs(function(ns){return [{id:Date.now(),text:leadCallName(leadId)+" qualified as "+result.result+" ("+result.score+"/100)",time:"Just now",color:STATUS_CONFIG[result.result]?STATUS_CONFIG[result.result].color:"#34D399",read:false}].concat(ns);});
    setQualifyingLead(null);
  }
  function leadCallName(id){var l=leads.find(function(x){return x.id===id;});return l?l.name:"Lead";}

  function handleBulkAdd(count){
    setNotifs(function(ns){return [{id:Date.now(),text:count+" leads imported -- AI qualification calls starting",time:"Just now",color:"#34D399",read:false}].concat(ns);});
  }

  function handleStatusChange(id,st){
    setLeads(function(p){return p.map(function(l){if(l.id!==id)return l;var u=Object.assign({},l,{status:st});u.activities=[{type:"status",text:"Status updated: "+st,time:"Just now",color:STATUS_CONFIG[st]?STATUS_CONFIG[st].color:"#6EE7F7"}].concat(l.activities);return u;});});
    if(selected&&selected.id===id)setSelected(function(l){return Object.assign({},l,{status:st});});
  }

  function handleUpdateLead(id,patch,activityText,activityColor){
    setLeads(function(p){return p.map(function(l){
      if(l.id!==id)return l;
      var u=Object.assign({},l,patch);
      if(activityText){u.activities=[{type:"status",text:activityText,time:"Just now",color:activityColor||"#6EE7F7"}].concat(l.activities||[]);}
      return u;
    });});
    if(selected&&selected.id===id)setSelected(function(l){return Object.assign({},l,patch);});
  }

  if(selected){
    var fresh=leads.find(function(l){return l.id===selected.id;})||selected;
    return <LeadDetail lead={fresh} onBack={function(){setSelected(null);}} onStatusChange={handleStatusChange} onUpdateLead={handleUpdateLead}/>;
  }

  return(
    <div style={{position:"relative",minHeight:"100vh",background:"#060810"}}>
      <div className="screen">
        <div style={{paddingTop:52,marginBottom:14}}>
          {onBack&&<button onClick={onBack} style={{background:"none",border:"none",color:"#6B7280",cursor:"pointer",fontSize:13,marginBottom:10,padding:0}}>← Back to Dashboard</button>}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
            <div><div style={{fontSize:12,color:"#6B7280",marginBottom:2}}>Lead CRM</div><div className="syne" style={{fontWeight:800,fontSize:22}}>Leads <span style={{color:"#6EE7F7"}}>{leads.length}</span></div></div>
            <button onClick={function(){setShowAdd(true);}} style={{background:"linear-gradient(135deg,#6EE7F7,#38BDF8)",border:"none",borderRadius:12,padding:"10px 16px",color:"#020B10",fontWeight:700,fontSize:13,cursor:"pointer"}}>+ Add Lead</button>
          </div>
          <div style={{background:"linear-gradient(135deg,#0D2830,#1A1200)",border:"1px solid rgba(110,231,247,0.3)",borderRadius:12,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:"#34D399",animation:"pulse 1.5s ease infinite",flexShrink:0}}/>
            <div style={{fontSize:12,color:"#6B7280"}}>AI is live -- <span style={{color:"#34D399"}}>auto-qualifying new leads & sending follow-ups</span></div>
          </div>
          <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4,marginBottom:12}}>
            {TILES.map(function(tile){
              var isAct=activeTile===tile.key;
              return <div key={tile.key} className={"stat-tile"+(isAct?" sel":"")} onClick={function(){setActiveTile(isAct?null:tile.key);setFilter("All");}}>
                <div className="syne" style={{fontSize:18,fontWeight:800,color:tile.color}}>{tile.count}</div>
                <div style={{fontSize:10,color:isAct?tile.color:"#6B7280",marginTop:2}}>{tile.label}</div>
                {isAct&&<div style={{width:4,height:4,borderRadius:"50%",background:tile.color,margin:"4px auto 0"}}/>}
              </div>;
            })}
          </div>
          <div style={{position:"relative",marginBottom:8}}>
            <span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",color:"#6B7280",fontSize:13}}></span>
            <input className="search-input" placeholder="Search name or phone..." value={search} onChange={function(e){setSearch(e.target.value);}}/>
            {search&&<button onClick={function(){setSearch("");}} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#6B7280",cursor:"pointer",fontSize:15}}></button>}
          </div>
          <div style={{display:"flex",gap:6,marginBottom:8,alignItems:"center"}}>
            <span style={{fontSize:11,color:"#6B7280",flexShrink:0}}>Sort:</span>
            {[{k:"score",l:"AI Score"},{k:"name",l:"Name"},{k:"date",l:"Lead Date"}].map(function(s){return <button key={s.k} className={"filter-chip"+(sortBy===s.k?" active":"")} style={{fontSize:11,padding:"4px 10px"}} onClick={function(){setSortBy(s.k);}}>{s.l}</button>;})}
            <button onClick={function(){setShowFilters(true);}} style={{marginLeft:"auto",padding:"5px 12px",borderRadius:99,fontSize:11,fontWeight:600,background:hasActiveFilters?"#0D2830":"none",border:"1px solid "+(hasActiveFilters?"#6EE7F7":"#1F2937"),color:hasActiveFilters?"#6EE7F7":"#6B7280",cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
               Filters{hasActiveFilters&&<span style={{background:"#6EE7F7",color:"#020B10",borderRadius:"50%",width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800}}>!</span>}
            </button>
            {(activeTile||filter!=="All"||hasActiveFilters)&&<button onClick={function(){setActiveTile(null);setFilter("All");setActiveFilters({});}} style={{padding:"4px 10px",borderRadius:99,fontSize:11,background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.3)",color:"#F87171",cursor:"pointer"}}>Clear </button>}
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",paddingBottom:4}}>
            {activeFilters.status&&<span className="filter-chip active" style={{display:"inline-flex",alignItems:"center",gap:6}}>{STATUS_CONFIG[activeFilters.status]?STATUS_CONFIG[activeFilters.status].icon+" ":""}{activeFilters.status}<span onClick={function(){setActiveFilters(function(a){var n=Object.assign({},a);delete n.status;return n;});}} style={{cursor:"pointer",opacity:0.7}}>✕</span></span>}
            {activeFilters.source&&<span className="filter-chip active" style={{display:"inline-flex",alignItems:"center",gap:6}}>{SOURCE_ICONS[activeFilters.source]||""} {activeFilters.source}<span onClick={function(){setActiveFilters(function(a){var n=Object.assign({},a);delete n.source;return n;});}} style={{cursor:"pointer",opacity:0.7}}>✕</span></span>}
            {activeFilters.rating&&<span className="filter-chip active" style={{display:"inline-flex",alignItems:"center",gap:6}}>Rating {activeFilters.rating}★<span onClick={function(){setActiveFilters(function(a){var n=Object.assign({},a);delete n.rating;return n;});}} style={{cursor:"pointer",opacity:0.7}}>✕</span></span>}
            {(activeFilters.dateFrom||activeFilters.dateTo)&&<span className="filter-chip active" style={{display:"inline-flex",alignItems:"center",gap:6}}>Lead date {activeFilters.dateFrom||"…"}→{activeFilters.dateTo||"…"}<span onClick={function(){setActiveFilters(function(a){var n=Object.assign({},a);delete n.dateFrom;delete n.dateTo;return n;});}} style={{cursor:"pointer",opacity:0.7}}>✕</span></span>}
            {activeFilters.followupDate&&<span className="filter-chip active" style={{display:"inline-flex",alignItems:"center",gap:6}}>{activeFilters.followupDate==="done"?"Followed up":"Follow-up pending"}<span onClick={function(){setActiveFilters(function(a){var n=Object.assign({},a);delete n.followupDate;return n;});}} style={{cursor:"pointer",opacity:0.7}}>✕</span></span>}
            {(activeFilters.eventFrom||activeFilters.eventTo)&&<span className="filter-chip active" style={{display:"inline-flex",alignItems:"center",gap:6}}>Event {activeFilters.eventFrom||"…"}→{activeFilters.eventTo||"…"}<span onClick={function(){setActiveFilters(function(a){var n=Object.assign({},a);delete n.eventFrom;delete n.eventTo;return n;});}} style={{cursor:"pointer",opacity:0.7}}>✕</span></span>}
            {(activeFilters.closureFrom||activeFilters.closureTo)&&<span className="filter-chip active" style={{display:"inline-flex",alignItems:"center",gap:6}}>Closure {activeFilters.closureFrom||"…"}→{activeFilters.closureTo||"…"}<span onClick={function(){setActiveFilters(function(a){var n=Object.assign({},a);delete n.closureFrom;delete n.closureTo;return n;});}} style={{cursor:"pointer",opacity:0.7}}>✕</span></span>}
            {!hasActiveFilters&&<span style={{fontSize:11,color:"#6B7280"}}>No filters applied — tap Filters to filter by status, source, rating or dates</span>}
          </div>
          {activeTile&&<div style={{background:TILES.find(function(t){return t.key===activeTile;}).color+"11",border:"1px solid "+TILES.find(function(t){return t.key===activeTile;}).color+"33",borderRadius:10,padding:"7px 12px",marginTop:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:12,color:TILES.find(function(t){return t.key===activeTile;}).color,fontWeight:600}}>Showing: {TILES.find(function(t){return t.key===activeTile;}).label} ({filtered.length})</span><button onClick={function(){setActiveTile(null);}} style={{background:"none",border:"none",color:"#6B7280",cursor:"pointer",fontSize:11}}>Clear</button></div>}
        </div>

        <div style={{fontSize:11,color:"#6B7280",marginBottom:10}}>{filtered.length} lead{filtered.length!==1?"s":""}</div>

        {filtered.length===0?(
          <div style={{textAlign:"center",padding:"36px 0"}}><div style={{fontSize:40,marginBottom:10}}></div><div style={{fontSize:13,color:"#6B7280"}}>No leads found</div><button onClick={function(){setFilter("All");setActiveTile(null);setSearch("");}} style={{marginTop:12,padding:"8px 16px",borderRadius:10,background:"#0D2830",border:"1px solid #6EE7F7",color:"#6EE7F7",cursor:"pointer",fontSize:12}}>Clear Filters</button></div>
        ):(
          filtered.map(function(lead){
            var cfg=STATUS_CONFIG[lead.status]||STATUS_CONFIG["Other"];
            return(
              <div key={lead.id} className="lead-card" onClick={function(){setSelected(lead);}}>
                <div style={{position:"absolute",left:0,top:0,bottom:0,width:3,background:cfg.color,borderRadius:"99px 0 0 99px"}}/>
                <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                  <ScoreRing score={lead.score} size={42}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:3}}>
                      <div className="syne" style={{fontWeight:700,fontSize:15}}>{lead.name}</div>
                      <span style={{display:"inline-flex",alignItems:"center",gap:3,padding:"3px 8px",borderRadius:99,background:cfg.bg,border:"1px solid "+cfg.color+"44",fontSize:10,fontWeight:700,color:cfg.color,flexShrink:0,marginLeft:6}}>{cfg.icon} {lead.status}</span>
                    </div>
                    <div style={{fontSize:12,color:"#6B7280",marginBottom:3}}>{lead.phone} . {SOURCE_ICONS[lead.source]} {lead.source}</div>
                    {lead.requirement&&<div style={{fontSize:12,color:"#F0F4FF",marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{lead.requirement}</div>}
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontSize:11,color:"#F0C060"}}>{lead.budget&&" "+lead.budget}</span>
                      <span style={{fontSize:10,color:"#6B7280"}}>{lead.assigned} . {lead.createdAt}</span>
                    </div>
                    {lead.aiQualification&&<div style={{fontSize:10,color:lead.aiQualification.result==="Qualified"||lead.aiQualification.result==="Closed"||lead.aiQualification.result==="Appointment"?"#34D399":"#F0C060",marginTop:3}}> {lead.aiQualification.result}</div>}
                    {lead.eventDate&&<div style={{fontSize:10,color:"#F0C060",marginTop:3}}>📅 {lead.eventType||"Event"}: {lead.eventDate}{lead.eventTime?" "+lead.eventTime:""}</div>}
                  </div>
                </div>
              </div>
            );
          })
        )}
      </div>

      {showAdd&&<AddLeadModal onAdd={handleAdd} onBulkAdd={handleBulkAdd} onClose={function(){setShowAdd(false);}}/>}
      {showFilters&&<FilterModal current={activeFilters} onApply={function(f){setActiveFilters(f);}} onClose={function(){setShowFilters(false);}}/>}
      {qualifyingLead&&<NewLeadQualificationModal lead={qualifyingLead} bizNumber={bizNumber} onComplete={function(result,log,elapsed){handleQualificationComplete(qualifyingLead.id,result,log,elapsed);}}/>}
    </div>
  );
}

// ─── ROOT ────────────────────────────────────────────────────────────────────
function ZentraApp() {
  const [splash, setSplash] = useState(true);
  const [screen, setScreen] = useState("auth"); // auth | step1 | step2 | step3 | success | app
  const [user, setUser] = useState(null);
  const [biz, setBiz] = useState({});
  const [subscription, setSubscription] = useState(null); // { plan: 'basic'|'pro'|'enterprise' }
  const [section, setSection] = useState("home"); // home | leads | campaigns | aitools | settings — client-side nav
  const [bizKnowledge, setBizKnowledge] = useState({ description: "", pricing: "", faqs: "", script: "" });

  const handleAuth = (u) => {
    // Existing account (came from the Login tab, matched against ACCOUNTS)
    if (u.role) {
      setUser(u);
      if (u.plan) setSubscription({ plan: u.plan });
      setScreen("app");
      return;
    }
    // New signup using the Super Admin email — bypass onboarding
    if (u.email === SUPER_ADMIN.email) {
      setUser({ ...u, name: SUPER_ADMIN.name, role: "superadmin" });
      setScreen("app");
      return;
    }
    // New client signup — walk through onboarding
    setUser(u);
    setScreen("step1");
  };

  return (
    <BizKnowledgeContext.Provider value={{ bizKnowledge: bizKnowledge, setBizKnowledge: setBizKnowledge }}>
      <InjectStyles />
      <div className="app">
        {splash && <SplashScreen onDone={() => setSplash(false)} />}

        {!splash && screen === "auth" && (
          <>
            <style>{authStyles}</style>
            <div className="mesh" />
            <AuthScreen onAuth={handleAuth} />
          </>
        )}

        {!splash && screen === "step1" && (
          <>
            <style>{authStyles}</style>
            <div className="mesh" />
            <OnboardingStep1 data={biz} onChange={setBiz} onNext={() => setScreen("step2")} />
          </>
        )}
        {!splash && screen === "step2" && (
          <>
            <style>{authStyles}</style>
            <div className="mesh" />
            <OnboardingStep2 data={biz} onChange={setBiz}
              onNext={() => setScreen("step3")} onBack={() => setScreen("step1")} />
          </>
        )}
        {!splash && screen === "step3" && (
          <>
            <style>{authStyles}</style>
            <div className="mesh" />
            <OnboardingStep3 data={biz} onChange={setBiz}
              onNext={() => setScreen("success")} onBack={() => setScreen("step2")} />
          </>
        )}
        {!splash && screen === "success" && (
          <>
            <style>{authStyles}</style>
            <div className="mesh" />
            <SuccessScreen user={user} onViewDashboard={() => { setUser(u => ({ ...u, whatsappNumber: biz.phone || (u && u.whatsappNumber) })); setScreen("app"); }} />
          </>
        )}

        {!splash && screen === "app" && user && user.role === "superadmin" && (
          <SuperAdminDashboard user={user} />
        )}

        {!splash && screen === "app" && user && user.role !== "superadmin" && (
          <>
            {section === "home" && (
              <ClientDashboard
                user={user}
                plan={subscription ? subscription.plan : (user.plan || null)}
                onOpenLeadCRM={() => setSection("leads")}
              />
            )}
            {section === "leads" && (
              <LeadCRM user={user} onBack={() => setSection("home")} />
            )}
            {section === "whatsapp" && (
              <div className="screen" style={{ paddingTop: 52, paddingBottom: 100 }}>
                <div style={{ fontSize: 12, color: "#6B7280", marginBottom: 2 }}>Connected inbox</div>
                <div className="syne" style={{ fontWeight: 800, fontSize: 22, marginBottom: 16 }}>WhatsApp</div>
                <WhatsAppWebPanel user={user} />
              </div>
            )}
            {section === "aitools" && (
              <AIToolsHub
                plan={subscription ? subscription.plan : (user.plan || null)}
                onOpenLeadCRM={() => setSection("leads")}
                onOpenWhatsApp={() => setSection("whatsapp")}
              />
            )}
            {section === "settings" && (
              <div className="screen" style={{ paddingTop: 52, paddingBottom: 100 }}>
                <FeatureScreen feature="Settings" onBack={() => setSection("home")} />
              </div>
            )}
            <SharedBottomNav section={section} setSection={setSection} />
          </>
        )}

        {!splash && screen === "app" && user && (
          <ZentraAI
            user={user}
            context={
              user.role === "superadmin"
                ? "Viewing the Super Admin dashboard (all client brands)."
                : "Currently viewing the '" + section + "' section of the app."
            }
          />
        )}
      </div>
    </BizKnowledgeContext.Provider>
  );
}


const rootEl = ReactDOM.createRoot(document.getElementById("root"));
rootEl.render(<ZentraApp />);
</script>
</body>
</html>
