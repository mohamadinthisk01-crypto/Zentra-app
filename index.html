<script>
  // Catches ANY error, even before React/Babel run, and shows it on screen
  // instead of leaving a silent blank page.
  window.addEventListener("error", function(e) {
    var box = document.getElementById("boot-error");
    var status = document.getElementById("boot-status");
    if (status) status.style.display = "none";
    if (box) {
      box.style.display = "block";
      box.textContent += "ERROR: " + e.message + "\n" + "at " + (e.filename || "") + ":" + (e.lineno || "") + ":" + (e.colno || "") + "\n\n";
    }
  });
  window.addEventListener("unhandledrejection", function(e) {
    var box = document.getElementById("boot-error");
    var status = document.getElementById("boot-status");
    if (status) status.style.display = "none";
    if (box) {
      box.style.display = "block";
      box.textContent += "PROMISE ERROR: " + (e.reason && e.reason.message ? e.reason.message : e.reason) + "\n\n";
    }
  });
</script>

class ZentraErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { error: null, info: null };
  }
  static getDerivedStateFromError(error) {
    return { error: error };
  }
  componentDidCatch(error, info) {
    this.setState({ info: info });
  }
  render() {
    if (this.state.error) {
      return React.createElement(
        "div",
        { style: { padding: 20, color: "#F87171", fontFamily: "monospace", fontSize: 12, whiteSpace: "pre-wrap", lineHeight: 1.6, background: "#0D1117" } },
        "REACT RENDER ERROR:\n\n" +
        this.state.error.toString() +
        "\n\n" +
        (this.state.error.stack || "") +
        "\n\n--- component stack ---\n" +
        (this.state.info ? this.state.info.componentStack : "")
      );
    }
    return this.props.children;
  }
}

  {id:"samantha", label:"Rachel",  desc:"Warm & silk female",    emoji:"🌸", match:["Samantha","Karen"]},

];

function findVoice(profileId) {
  if (!window.speechSynthesis) return null;
  var voices = window.speechSynthesis.getVoices();
  var profile = VOICE_PROFILES.find(function(p){return p.id===profileId;});
  if (!profile || profile.id==="auto") {
    return voices.find(function(v){return v.lang==="en-US"||v.lang==="en-GB"||v.lang.startsWith("en");}) || null;
  }
  for (var i=0;i<profile.match.length;i++) {
    var found = voices.find(function(v){return v.name.indexOf(profile.match[i])>-1;});
    if (found) return found;
  }
  return voices.find(function(v){return v.lang.startsWith("en");}) || null;
}

// ElevenLabs Voice IDs — silk human voices
var ELEVEN_VOICES = {
  "rachel":    "21m00Tcm4TlvDq8ikWAM",  // Rachel — warm, natural female
  "bella":     "EXAVITQu4vr4xnSDxMaL",  // Bella — soft, expressive female
  "adam":      "pNInz6obpgDQGcFmaJgB",  // Adam — deep, professional male
  "josh":      "TxGEqnHWrfWFTfGW9XjX",  // Josh — friendly conversational male
  "arnold":    "VR6AewLTigWG4xSOukaG",  // Arnold — strong, confident male
  "domi":      "AZnzlk1XvdvUeBnXmlld",  // Domi — energetic, clear female
};

var _currentAudio = null;

function speakText(text, profileId, rate, pitch) {
  // Stop any playing audio
  if (_currentAudio) { try { _currentAudio.pause(); _currentAudio.currentTime=0; } catch(e){} _currentAudio=null; }
  if (window.speechSynthesis) window.speechSynthesis.cancel();

  // Map profile to ElevenLabs voice ID
  var voiceMap = {
    "samantha": "rachel", "aria": "bella", "daniel": "adam",
    "moira": "domi", "rishi": "josh", "auto": "rachel",
  };
  var elevenKey = voiceMap[profileId] || "rachel";
  var voiceId = ELEVEN_VOICES[elevenKey];

  // Try ElevenLabs via Puter.js first (free, ultra-realistic)
  if (window.puter && window.puter.ai && window.puter.ai.txt2speech) {
    window.puter.ai.txt2speech(text, {
      provider: "elevenlabs",
      voice: voiceId,
      model: "eleven_multilingual_v2",
    }).then(function(audio) {
      _currentAudio = audio;
      audio.play();
    }).catch(function(err) {
      // Fallback to browser TTS if Puter unavailable
      _browserSpeak(text, profileId, rate, pitch);
    });
  } else {
    // Fallback: browser TTS with best available voice
    _browserSpeak(text, profileId, rate, pitch);
  }
}

function _browserSpeak(text, profileId, rate, pitch) {
  if (!window.speechSynthesis) return;
  function doSpeak() {
    var u = new SpeechSynthesisUtterance(text);
    var voice = findVoice(profileId||"samantha");
    if (voice) u.voice = voice;
    u.rate = rate || 0.92;
    u.pitch = pitch || 1.05;
    u.volume = 0.9;
    window.speechSynthesis.speak(u);
  }
  if (window.speechSynthesis.getVoices().length===0) {
    window.speechSynthesis.onvoiceschanged = function(){doSpeak();window.speechSynthesis.onvoiceschanged=null;};
  } else { doSpeak(); }
}

function AuthScreen({ onAuth }) {
  const [tab, setTab] = useState("login");
  const [form, setForm] = useState({ name: "", email: "", password: "", confirm: "" });
  const [errors, setErrors] = useState({});
  const [loading, setLoading] = useState(false);
  const [showPass, setShowPass] = useState(false);
  const [showGooglePicker, setShowGooglePicker] = useState(false);

  const set = (k, v) => {
    setForm(f => ({ ...f, [k]: v }));
    setErrors(e => ({ ...e, [k]: "" }));
  };

  const validate = () => {
    const e = {};
    if (tab === "signup" && !form.name.trim()) e.name = "Full name is required";
    if (!form.email.trim()) {
      e.email = "Email is required";
    } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) {
      e.email = "Enter a valid email address";
    }
    if (!form.password) {
      e.password = "Password is required";
    } else if (tab === "signup" && form.password.length < 8) {
      e.password = "Password must be at least 8 characters";
    }
    if (tab === "signup" && form.password && form.confirm !== form.password) {
      e.confirm = "Passwords do not match";
    }
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const handleSubmit = () => {
    if (!validate()) return;
    setLoading(true);
    setTimeout(() => {
      setLoading(false);
      if (tab === "login") {
        const acc = ACCOUNTS.find(a => a.email.toLowerCase() === form.email.toLowerCase() && a.password === form.password);
        if (acc) {
          onAuth(acc);
        } else {
          setErrors(e => ({ ...e, password: "Incorrect email or password." }));
        }
        return;
      }
      onAuth({ name: form.name || "User", email: form.email });
    }, 1200);
  };

  const handleGoogleConfirm = (account) => {
    setShowGooglePicker(false);
    onAuth({ name: account.name, email: account.email, via: "google" });
  };

  const canSubmit = tab === "login"
    ? form.email && form.password
    : form.name && form.email && form.password && form.confirm;

  return (
    <div className="screen">
      <div className="logo-wrap">
        <div className="logo-icon">⚡</div>
        <div className="logo-text">Zentra AI</div>
      </div>

      <p className="subtitle" style={{ marginBottom: 24, marginTop: 4 }}>
        The AI sales engine for high-growth teams
      </p>

      <div className="tab-row">
        <button
          className={`tab ${tab === "login" ? "active" : ""}`}
          onClick={() => { setTab("login"); setErrors({}); }}
        >Log In</button>
        <button
          className={`tab ${tab === "signup" ? "active" : ""}`}
          onClick={() => { setTab("signup"); setErrors({}); }}
        >Sign Up</button>
      </div>

      {tab === "signup" && (
        <div className="field">
          <label className="label">Full Name <span style={{color: C.danger}}>*</span></label>
          <input
            className="input"
            style={errors.name ? { borderColor: C.danger } : {}}
            placeholder="Rahul Sharma"
            value={form.name}
            onChange={e => set("name", e.target.value)}
          />
          {errors.name && <p style={{ color: C.danger, fontSize: 12, marginTop: 5 }}>⚠ {errors.name}</p>}
        </div>
      )}

      <div className="field">
        <label className="label">Email Address <span style={{color: C.danger}}>*</span></label>
        <input
          className="input"
          style={errors.email ? { borderColor: C.danger } : {}}
          type="email"
          placeholder="e.g. rahul@yourbusiness.com"
          value={form.email}
          onChange={e => set("email", e.target.value)}
        />
        {errors.email && <p style={{ color: C.danger, fontSize: 12, marginTop: 5 }}>⚠ {errors.email}</p>}
      </div>

      <div className="field">
        <label className="label">Password <span style={{color: C.danger}}>*</span></label>
        <div style={{ position: "relative" }}>
          <input
            className="input"
            style={errors.password ? { borderColor: C.danger, paddingRight: 48 } : { paddingRight: 48 }}
            type={showPass ? "text" : "password"}
            placeholder={tab === "signup" ? "Min. 8 characters" : "••••••••"}
            value={form.password}
            onChange={e => set("password", e.target.value)}
          />
          <button
            onClick={() => setShowPass(s => !s)}
            style={{
              position: "absolute", right: 14, top: "50%", transform: "translateY(-50%)",
              background: "none", border: "none", cursor: "pointer",
              color: C.muted, fontSize: 14, fontFamily: "'DM Sans', sans-serif"
            }}
          >{showPass ? "Hide" : "Show"}</button>
        </div>
        {errors.password && <p style={{ color: C.danger, fontSize: 12, marginTop: 5 }}>⚠ {errors.password}</p>}
      </div>

      {tab === "signup" && (
        <div className="field" style={{ marginBottom: 0 }}>
          <label className="label">Confirm Password <span style={{color: C.danger}}>*</span></label>
          <input
            className="input"
            style={errors.confirm ? { borderColor: C.danger } : {}}
            type="password"
            placeholder="Re-enter password"
            value={form.confirm}
            onChange={e => set("confirm", e.target.value)}
          />
          {errors.confirm && <p style={{ color: C.danger, fontSize: 12, marginTop: 5 }}>⚠ {errors.confirm}</p>}
        </div>
      )}

      {tab === "login" && (
        <div style={{ textAlign: "right", marginTop: 8 }}>
          <span className="link" style={{ fontSize: 13 }}>Forgot password?</span>
        </div>
      )}

      {tab === "login" && (
        <div style={{ textAlign: "center", marginTop: 16, fontSize: 12, color: C.muted }}>
          Demo: try <span style={{ color: C.accent }}>Inthiyazskmd@gmail.com</span> / <span style={{ color: C.accent }}>12345678</span>
        </div>
      )}

      <div style={{ marginTop: 24 }}>
        <button
          className="btn btn-primary"
          onClick={handleSubmit}
          disabled={loading || !canSubmit}
          style={{ opacity: canSubmit ? 1 : 0.5 }}
        >
          {loading
            ? tab === "login" ? "Signing in…" : "Creating account…"
            : tab === "login" ? "Log In →" : "Create Account →"}
        </button>
      </div>

      <div className="divider" style={{ marginTop: 20 }}>or continue with</div>

      <button
        className="btn btn-google"
        onClick={() => setShowGooglePicker(true)}
        disabled={loading}
      >
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#4285F4" d="M44.5 20H24v8.5h11.7C34.2 33.4 29.7 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 2.9l6-6C34.5 6.5 29.5 4.5 24 4.5 12.7 4.5 3.5 13.7 3.5 25s9.2 20.5 20.5 20.5c11.8 0 20-8.2 20-20.5 0-1.4-.1-2.7-.3-4z"/>
        </svg>
        Continue with Google
      </button>

      {showGooglePicker && (
        <GoogleAccountPicker
          onConfirm={handleGoogleConfirm}
          onBack={() => setShowGooglePicker(false)}
        />
      )}
    </div>
  );
}

      setCustomError("");
      return;

    const next = selected.includes(id) ? selected.filter(s => s !== id) : [...selected, id];

function OnboardingStep3({ data, onChange, onNext, onBack }) {
  const members = data.members || [{ ...EMPTY_MEMBER }];
  const [errors, setErrors] = useState([{}]);
  const [submitAttempted, setSubmitAttempted] = useState(false);

  const setMembers = (updated) => onChange({ ...data, members: updated });

  const updateMember = (i, val) => {
    const updated = members.map((m, idx) => idx === i ? val : m);
    setMembers(updated);
    if (submitAttempted) validateAll(updated);
  };

  const addMember = () => {
    if (members.length < 2) setMembers([...members, { ...EMPTY_MEMBER }]);
  };

  const removeMember = (i) => {
    const updated = members.filter((_, idx) => idx !== i);
    setMembers(updated);
    setErrors(e => e.filter((_, idx) => idx !== i));
  };

  const validateAll = (list) => {
    const errs = list.map(m => {
      const e = {};
      if (!m.name.trim()) e.name = "Name is required";
      if (!m.email.trim()) e.email = "Email is required";
      else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(m.email)) e.email = "Enter a valid email";
      if (!m.password) e.password = "Password is required";
      else if (m.password.length < 6) e.password = "Min. 6 characters";
      return e;
    });
    setErrors(errs);
    return errs.every(e => Object.keys(e).length === 0);
  };

  const handleContinue = () => {
    setSubmitAttempted(true);
    if (validateAll(members)) onNext();
  };

  const isComplete = members.every(m => m.name && m.email && m.password);

  return (
    <div className="screen">
      <button className="back-btn" onClick={onBack}>← Back</button>

      <div className="progress-wrap" style={{ paddingTop: 0 }}>
        <div className="progress-label">Step 3 of 3 — Team Setup</div>
        <div className="progress-bar-bg">
          <div className="progress-bar-fill" style={{ width: "100%" }} />
        </div>
        <div className="step-dots">
          <div className="dot done" />
          <div className="dot done" />
          <div className="dot active" />
        </div>
      </div>

      <h1 className="h1">Set up your <span>team</span></h1>
      <p className="subtitle">Add 1–2 members now. All fields are required to continue.</p>

      {members.map((m, i) => (
        <MemberForm
          key={i}
          member={m}
          index={i}
          onChange={(val) => updateMember(i, val)}
          onRemove={members.length > 1 ? () => removeMember(i) : null}
          errors={errors[i] || {}}
        />
      ))}

      {members.length < 2 && (
        <button
          onClick={addMember}
          style={{
            width: "100%", padding: "13px", borderRadius: 12,
            background: "none", border: "1px dashed #1F2937",
            color: "#6B7280", fontSize: 14, cursor: "pointer",
            fontFamily: "'DM Sans', sans-serif", marginBottom: 16,
            transition: "all 0.2s",
          }}
          onMouseOver={e => { e.target.style.borderColor = "#6EE7F7"; e.target.style.color = "#6EE7F7"; }}
          onMouseOut={e => { e.target.style.borderColor = "#1F2937"; e.target.style.color = "#6B7280"; }}
        >
          + Add another member ({members.length}/2)
        </button>
      )}

      <div style={{ marginTop: "auto", paddingTop: 8 }}>
        <button
          className="btn btn-primary"
          onClick={handleContinue}
          disabled={!isComplete}
          style={{ opacity: isComplete ? 1 : 0.45 }}
        >
          Continue →
        </button>
        <button
          className="btn btn-ghost"
          onClick={onNext}
          style={{ marginTop: 10 }}
        >
          Skip for now
        </button>
        <p style={{ textAlign: "center", fontSize: 12, color: "#6B7280", marginTop: 10 }}>
          You can manage your team anytime from Settings
        </p>
      </div>
    </div>
  );
}

            <div key={d.month} className="graph-bar" style={{position:"relative",zIndex:1}} onMouseEnter={function(){setHover(i);}} onMouseLeave={function(){setHover(null);}}>
              <div style={{width:"100%",display:"flex",gap:2,alignItems:"flex-end",height:90}}>
                <div className="graph-fill" style={{height:animated?Math.round((d.leads/maxVal)*90)+"px":"0px",flex:1,background:"linear-gradient(180deg,#6EE7F7,rgba(110,231,247,0.3))",transitionDelay:(i*0.08)+"s"}}/>
                <div className="graph-fill" style={{height:animated?Math.round((d.conv/maxVal)*90)+"px":"0px",flex:1,background:"linear-gradient(180deg,#F0C060,rgba(240,192,96,0.3))",transitionDelay:(i*0.08+0.04)+"s"}}/>
              </div>
              {hover===i&&(<div style={{position:"absolute",bottom:"108%",left:"50%",transform:"translateX(-50%)",background:"#0D1117",border:"1px solid #6EE7F7",borderRadius:8,padding:"6px 10px",whiteSpace:"nowrap",fontSize:11,zIndex:10}}><div style={{color:"#6EE7F7"}}>{d.leads} leads</div><div style={{color:"#F0C060"}}>{d.conv} conv.</div></div>)}
              <div className="graph-label">{d.month}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

            <span style={{fontSize:12,color:"#6B7280"}}>Voice Pitch</span>
            <span style={{fontSize:12,color:"#6EE7F7"}}>{pitch.toFixed(2)}</span>
          </div>
          <input type="range" min="0.7" max="1.4" step="0.05" value={pitch}
            onChange={function(e){setPitch(parseFloat(e.target.value));}}
            style={{width:"100%",accentColor:"#6EE7F7"}}/>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#6B7280",marginTop:4}}>
            <span>Deeper</span><span>Natural</span><span>Higher</span>
          </div>
        </div>

        <div style={{background:"#0D2830",border:"1px solid #6EE7F7",borderRadius:12,padding:"12px 14px",marginBottom:16,fontSize:12,color:"#6B7280",lineHeight:1.6}}>
          <span style={{color:"#6EE7F7",fontWeight:600}}>Note: </span>
          For the most human-like voices, use the device your app runs on — mobile devices (iOS/Android) have premium neural voices like Siri and Google TTS built in. In the React Native app, integrate <span style={{color:"#6EE7F7"}}>Eleven Labs</span> or <span style={{color:"#6EE7F7"}}>Play.ht</span> API for ultra-realistic voices similar to Rumble AI style.
        </div>

        <button className="btn-primary" onClick={function(){props.onSave(voiceId,rate,pitch);onClose();}}>Save Voice Settings</button>
        <button className="btn-ghost" onClick={function(){testVoice(voiceId);}}>▶ Test Voice</button>
      </div>
    </div>
  );
}
