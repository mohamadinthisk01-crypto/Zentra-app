var VOICE_PROFILES = [
  {id:"samantha", label:"Rachel",  desc:"Warm & silk female",    emoji:"🌸", match:["Samantha","Karen"]},
  {id:"aria",     label:"Bella",   desc:"Soft & expressive",     emoji:"✨", match:["Aria","Zira"]},

];

function findVoice(profileId) {
  if (!window.speechSynthesis) return null;
  var voices = window.speechSynthesis.getVoices();
  var profile = VOICE_PROFILES.find(function(p){return p.id===profileId;});
  if (!profile || profile.id==="auto") {
    return voices.find(function(v){return v.lang==="en-US"||v.lang==="en-GB"||v.lang.startsWith("en");}) || null;
  }
  for (var i=0;i<profile.match.length;i++) {
    var found = voices.find(function(v){return v.name.indexOf(profile.match[i])>-1;});
    if (found) return found;
  }
  return voices.find(function(v){return v.lang.startsWith("en");}) || null;
}

// ElevenLabs Voice IDs — silk human voices
var ELEVEN_VOICES = {
  "rachel":    "21m00Tcm4TlvDq8ikWAM",  // Rachel — warm, natural female
  "bella":     "EXAVITQu4vr4xnSDxMaL",  // Bella — soft, expressive female
  "adam":      "pNInz6obpgDQGcFmaJgB",  // Adam — deep, professional male
  "josh":      "TxGEqnHWrfWFTfGW9XjX",  // Josh — friendly conversational male
  "arnold":    "VR6AewLTigWG4xSOukaG",  // Arnold — strong, confident male
  "domi":      "AZnzlk1XvdvUeBnXmlld",  // Domi — energetic, clear female
};

var _currentAudio = null;

function speakText(text, profileId, rate, pitch) {
  // Stop any playing audio
  if (_currentAudio) { try { _currentAudio.pause(); _currentAudio.currentTime=0; } catch(e){} _currentAudio=null; }
  if (window.speechSynthesis) window.speechSynthesis.cancel();

  // Map profile to ElevenLabs voice ID
  var voiceMap = {
    "samantha": "rachel", "aria": "bella", "daniel": "adam",
    "moira": "domi", "rishi": "josh", "auto": "rachel",
  };
  var elevenKey = voiceMap[profileId] || "rachel";
  var voiceId = ELEVEN_VOICES[elevenKey];

  // Try ElevenLabs via Puter.js first (free, ultra-realistic)
  if (window.puter && window.puter.ai && window.puter.ai.txt2speech) {
    window.puter.ai.txt2speech(text, {
      provider: "elevenlabs",
      voice: voiceId,
      model: "eleven_multilingual_v2",
    }).then(function(audio) {
      _currentAudio = audio;
      audio.play();
    }).catch(function(err) {
      // Fallback to browser TTS if Puter unavailable
      _browserSpeak(text, profileId, rate, pitch);
    });
  } else {
    // Fallback: browser TTS with best available voice
    _browserSpeak(text, profileId, rate, pitch);
  }
}

function _browserSpeak(text, profileId, rate, pitch) {
  if (!window.speechSynthesis) return;
  function doSpeak() {
    var u = new SpeechSynthesisUtterance(text);
    var voice = findVoice(profileId||"samantha");
    if (voice) u.voice = voice;
    u.rate = rate || 0.92;
    u.pitch = pitch || 1.05;
    u.volume = 0.9;
    window.speechSynthesis.speak(u);
  }
  if (window.speechSynthesis.getVoices().length===0) {
    window.speechSynthesis.onvoiceschanged = function(){doSpeak();window.speechSynthesis.onvoiceschanged=null;};
  } else { doSpeak(); }
}

function AuthScreen({ onAuth }) {
  const [tab, setTab] = useState("login");
  const [form, setForm] = useState({ name: "", email: "", password: "", confirm: "" });
  const [errors, setErrors] = useState({});
  const [loading, setLoading] = useState(false);
  const [showPass, setShowPass] = useState(false);
  const [showGooglePicker, setShowGooglePicker] = useState(false);

  const set = (k, v) => {
    setForm(f => ({ ...f, [k]: v }));
    setErrors(e => ({ ...e, [k]: "" }));
  };

  const validate = () => {
    const e = {};
    if (tab === "signup" && !form.name.trim()) e.name = "Full name is required";
    if (!form.email.trim()) {
      e.email = "Email is required";
    } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) {
      e.email = "Enter a valid email address";
    }
    if (!form.password) {
      e.password = "Password is required";
    } else if (tab === "signup" && form.password.length < 8) {
      e.password = "Password must be at least 8 characters";
    }
    if (tab === "signup" && form.password && form.confirm !== form.password) {
      e.confirm = "Passwords do not match";
    }
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const handleSubmit = () => {
    if (!validate()) return;
    setLoading(true);
    setTimeout(() => {
      setLoading(false);
      if (tab === "login") {
        const acc = ACCOUNTS.find(a => a.email.toLowerCase() === form.email.toLowerCase() && a.password === form.password);
        if (acc) {
          onAuth(acc);
        } else {
          setErrors(e => ({ ...e, password: "Incorrect email or password." }));
        }
        return;
      }
      onAuth({ name: form.name || "User", email: form.email });
    }, 1200);
  };

  const handleGoogleConfirm = (account) => {
    setShowGooglePicker(false);
    onAuth({ name: account.name, email: account.email, via: "google" });
  };

  const canSubmit = tab === "login"
    ? form.email && form.password
    : form.name && form.email && form.password && form.confirm;

  return (
    <div className="screen">
      <div className="logo-wrap">
        <div className="logo-icon">⚡</div>
        <div className="logo-text">Zentra AI</div>
      </div>

      <p className="subtitle" style={{ marginBottom: 24, marginTop: 4 }}>
        The AI sales engine for high-growth teams
      </p>

      <div className="tab-row">
        <button
          className={`tab ${tab === "login" ? "active" : ""}`}
          onClick={() => { setTab("login"); setErrors({}); }}
        >Log In</button>
        <button
          className={`tab ${tab === "signup" ? "active" : ""}`}
          onClick={() => { setTab("signup"); setErrors({}); }}
        >Sign Up</button>
      </div>

      {tab === "signup" && (
        <div className="field">
          <label className="label">Full Name <span style={{color: C.danger}}>*</span></label>
          <input
            className="input"
            style={errors.name ? { borderColor: C.danger } : {}}
            placeholder="Rahul Sharma"
            value={form.name}
            onChange={e => set("name", e.target.value)}
          />
          {errors.name && <p style={{ color: C.danger, fontSize: 12, marginTop: 5 }}>⚠ {errors.name}</p>}
        </div>
      )}

      <div className="field">
        <label className="label">Email Address <span style={{color: C.danger}}>*</span></label>
        <input
          className="input"
          style={errors.email ? { borderColor: C.danger } : {}}
          type="email"
          placeholder="e.g. rahul@yourbusiness.com"
          value={form.email}
          onChange={e => set("email", e.target.value)}
        />
        {errors.email && <p style={{ color: C.danger, fontSize: 12, marginTop: 5 }}>⚠ {errors.email}</p>}
      </div>

      <div className="field">
        <label className="label">Password <span style={{color: C.danger}}>*</span></label>
        <div style={{ position: "relative" }}>
          <input
            className="input"
            style={errors.password ? { borderColor: C.danger, paddingRight: 48 } : { paddingRight: 48 }}
            type={showPass ? "text" : "password"}
            placeholder={tab === "signup" ? "Min. 8 characters" : "••••••••"}
            value={form.password}
            onChange={e => set("password", e.target.value)}
          />
          <button
            onClick={() => setShowPass(s => !s)}
            style={{
              position: "absolute", right: 14, top: "50%", transform: "translateY(-50%)",
              background: "none", border: "none", cursor: "pointer",
              color: C.muted, fontSize: 14, fontFamily: "'DM Sans', sans-serif"
            }}
          >{showPass ? "Hide" : "Show"}</button>
        </div>
        {errors.password && <p style={{ color: C.danger, fontSize: 12, marginTop: 5 }}>⚠ {errors.password}</p>}
      </div>

      {tab === "signup" && (
        <div className="field" style={{ marginBottom: 0 }}>
          <label className="label">Confirm Password <span style={{color: C.danger}}>*</span></label>
          <input
            className="input"
            style={errors.confirm ? { borderColor: C.danger } : {}}
            type="password"
            placeholder="Re-enter password"
            value={form.confirm}
            onChange={e => set("confirm", e.target.value)}
          />
          {errors.confirm && <p style={{ color: C.danger, fontSize: 12, marginTop: 5 }}>⚠ {errors.confirm}</p>}
        </div>
      )}

      {tab === "login" && (
        <div style={{ textAlign: "right", marginTop: 8 }}>
          <span className="link" style={{ fontSize: 13 }}>Forgot password?</span>
        </div>
      )}

      {tab === "login" && (
        <div style={{ textAlign: "center", marginTop: 16, fontSize: 12, color: C.muted }}>
          Demo: try <span style={{ color: C.accent }}>Inthiyazskmd@gmail.com</span> / <span style={{ color: C.accent }}>12345678</span>
        </div>
      )}

      <div style={{ marginTop: 24 }}>
        <button
          className="btn btn-primary"
          onClick={handleSubmit}
          disabled={loading || !canSubmit}
          style={{ opacity: canSubmit ? 1 : 0.5 }}
        >
          {loading
            ? tab === "login" ? "Signing in…" : "Creating account…"
            : tab === "login" ? "Log In →" : "Create Account →"}
        </button>
      </div>

      <div className="divider" style={{ marginTop: 20 }}>or continue with</div>

      <button
        className="btn btn-google"
        onClick={() => setShowGooglePicker(true)}
        disabled={loading}
      >
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#4285F4" d="M44.5 20H24v8.5h11.7C34.2 33.4 29.7 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 2.9l6-6C34.5 6.5 29.5 4.5 24 4.5 12.7 4.5 3.5 13.7 3.5 25s9.2 20.5 20.5 20.5c11.8 0 20-8.2 20-20.5 0-1.4-.1-2.7-.3-4z"/>
        </svg>
        Continue with Google
      </button>

      {showGooglePicker && (
        <GoogleAccountPicker
          onConfirm={handleGoogleConfirm}
          onBack={() => setShowGooglePicker(false)}
        />
      )}
    </div>
  );
}

function OnboardingStep2({ data, onChange, onNext, onBack }) {
  const selected = data.sources || [];
  const customSources = data.customSources || [];
  const [showCustomInput, setShowCustomInput] = useState(false);
  const [customInput, setCustomInput] = useState("");
  const [customError, setCustomError] = useState("");

  const toggle = (id) => {
    if (id === "custom") {
      setShowCustomInput(s => !s);
      setCustomError("");
      return;
    }
    const next = selected.includes(id) ? selected.filter(s => s !== id) : [...selected, id];
    onChange({ ...data, sources: next });
  };

  const addCustomSource = () => {
    const trimmed = customInput.trim();
    if (!trimmed) { setCustomError("Please enter a source name."); return; }
    if (customSources.map(s => s.toLowerCase()).includes(trimmed.toLowerCase())) {
      setCustomError("This source already exists."); return;
    }
    onChange({ ...data, customSources: [...customSources, trimmed] });
    setCustomInput("");
    setCustomError("");
  };

  const removeCustomSource = (name) => {
    onChange({ ...data, customSources: customSources.filter(s => s !== name) });
  };

function OnboardingStep3({ data, onChange, onNext, onBack }) {
  const members = data.members || [{ ...EMPTY_MEMBER }];
  const [errors, setErrors] = useState([{}]);
  const [submitAttempted, setSubmitAttempted] = useState(false);

  const setMembers = (updated) => onChange({ ...data, members: updated });

  const updateMember = (i, val) => {
    const updated = members.map((m, idx) => idx === i ? val : m);
    setMembers(updated);
    if (submitAttempted) validateAll(updated);
  };

  const addMember = () => {
    if (members.length < 2) setMembers([...members, { ...EMPTY_MEMBER }]);
  };

  const removeMember = (i) => {
    const updated = members.filter((_, idx) => idx !== i);
    setMembers(updated);
    setErrors(e => e.filter((_, idx) => idx !== i));
  };

  const validateAll = (list) => {
    const errs = list.map(m => {
      const e = {};
      if (!m.name.trim()) e.name = "Name is required";
      if (!m.email.trim()) e.email = "Email is required";
      else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(m.email)) e.email = "Enter a valid email";
      if (!m.password) e.password = "Password is required";
      else if (m.password.length < 6) e.password = "Min. 6 characters";
      return e;
    });
    setErrors(errs);
    return errs.every(e => Object.keys(e).length === 0);
  };

  const handleContinue = () => {
    setSubmitAttempted(true);
    if (validateAll(members)) onNext();
  };

  const isComplete = members.every(m => m.name && m.email && m.password);

  return (
    <div className="screen">
      <button className="back-btn" onClick={onBack}>← Back</button>

      <div className="progress-wrap" style={{ paddingTop: 0 }}>
        <div className="progress-label">Step 3 of 3 — Team Setup</div>
        <div className="progress-bar-bg">
          <div className="progress-bar-fill" style={{ width: "100%" }} />
        </div>
        <div className="step-dots">
          <div className="dot done" />
          <div className="dot done" />
          <div className="dot active" />
        </div>
      </div>

      <h1 className="h1">Set up your <span>team</span></h1>
      <p className="subtitle">Add 1–2 members now. All fields are required to continue.</p>

      {members.map((m, i) => (
        <MemberForm
          key={i}
          member={m}
          index={i}
          onChange={(val) => updateMember(i, val)}
          onRemove={members.length > 1 ? () => removeMember(i) : null}
          errors={errors[i] || {}}
        />
      ))}

      {members.length < 2 && (
        <button
          onClick={addMember}
          style={{
            width: "100%", padding: "13px", borderRadius: 12,
            background: "none", border: "1px dashed #1F2937",
            color: "#6B7280", fontSize: 14, cursor: "pointer",
            fontFamily: "'DM Sans', sans-serif", marginBottom: 16,
            transition: "all 0.2s",
          }}
          onMouseOver={e => { e.target.style.borderColor = "#6EE7F7"; e.target.style.color = "#6EE7F7"; }}
          onMouseOut={e => { e.target.style.borderColor = "#1F2937"; e.target.style.color = "#6B7280"; }}
        >
          + Add another member ({members.length}/2)
        </button>
      )}

      <div style={{ marginTop: "auto", paddingTop: 8 }}>
        <button
          className="btn btn-primary"
          onClick={handleContinue}
          disabled={!isComplete}
          style={{ opacity: isComplete ? 1 : 0.45 }}
        >
          Continue →
        </button>
        <button
          className="btn btn-ghost"
          onClick={onNext}
          style={{ marginTop: 10 }}
        >
          Skip for now
        </button>
        <p style={{ textAlign: "center", fontSize: 12, color: "#6B7280", marginTop: 10 }}>
          You can manage your team anytime from Settings
        </p>
      </div>
    </div>
  );
}

// ── ZENTRA OWNER / PLATFORM KNOWLEDGE ─────────────────────────────────────────
var ZENTRA_INFO = {
  ownerName: "Mohammad",
  ownerEmail: SUPER_ADMIN.email,
  platformName: "Zentra AI",
  tagline: "The AI sales engine that runs a business's entire lead-to-close pipeline automatically.",
  coreConcept: "Zentra AI is not just a CRM. It's an AI-driven sales engine: (1) the business trains the AI on how it sells, (2) the AI handles leads end-to-end -- calls, WhatsApp, follow-ups, (3) the AI analyzes performance, and (4) the AI suggests improvements.",
};

// ── UNIFIED AI ASSISTANT (real Claude API, persistent across every screen) ────
function ZentraAI(props) {
  var user = props.user;
  var context = props.context || "";
  var bizCtx = useContext(BizKnowledgeContext);
  var [open, setOpen] = useState(false);
  var [showVoice, setShowVoice] = useState(false);
  var [voiceId, setVoiceId] = useState("samantha");
  var [rate, setRate] = useState(0.92);
  var [pitch, setPitch] = useState(1.05);
  var [voiceOn, setVoiceOn] = useState(true);
  var [messages, setMessages] = useState([]);
  var [input, setInput] = useState("");
  var [loading, setLoading] = useState(false);
  var [listening, setListening] = useState(false);
  var [micSupported, setMicSupported] = useState(true);
  var [micError, setMicError] = useState(false);
  var scrollRef = useRef(null);
  var recogRef = useRef(null);
  var sendRef = useRef(null);

  useEffect(function () {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, open, loading]);

  useEffect(function () {
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setMicSupported(false); return; }
    try {
      var recog = new SR();
      recog.continuous = false;
      recog.interimResults = true;
      recog.lang = "en-IN";
      recog.onresult = function (e) {
        var transcript = "";
        for (var i = 0; i < e.results.length; i++) transcript += e.results[i][0].transcript;
        setInput(transcript);
      };
      recog.onerror = function () { setMicError(true); setListening(false); };
      recog.onend = function () {
        setListening(false);
        setInput(function (cur) { if (cur && cur.trim()) { sendRef.current(cur); } return cur; });
      };
      recogRef.current = recog;
    } catch (e) { setMicSupported(false); }
    return function () { try { recogRef.current && recogRef.current.abort(); } catch (e) {} };
    // eslint-disable-next-line
  }, []);

  function toggleMic() {
    if (!micSupported || !recogRef.current) return;
    if (listening) {
      recogRef.current.stop();
      setListening(false);
      return;
    }
    setMicError(false);
    setInput("");
    try {
      recogRef.current.start();
      setListening(true);
      setVoiceOn(true);
    } catch (e) {
      setMicError(true);
    }
  }

  function greeting() {
    if (!user) return "Hi! I'm Zentra, your AI assistant. Ask me anything about the platform.";
    if (user.role === "superadmin") {
      return "Hey " + ZENTRA_INFO.ownerName + "! I'm Zentra — I can see across all your brands. What would you like to look into?";
    }
    return "Hey " + (user.name || "there") + "! I'm Zentra, your AI sales assistant. Ask me about your leads, campaigns, or plan — I remember our conversation as we go.";
  }

  function systemPrompt() {
    var who = !user ? "a visitor exploring the app" :
      user.role === "superadmin" ? (ZENTRA_INFO.ownerName + ", the founder and super admin who owns the whole " + ZENTRA_INFO.platformName + " platform") :
      (user.name + ", a client business on the " + (user.plan || "no active") + " plan");
    return [
      "You are Zentra, the built-in AI assistant of " + ZENTRA_INFO.platformName + ".",
      ZENTRA_INFO.tagline,
      ZENTRA_INFO.coreConcept,
      ZENTRA_INFO.platformName + " was founded and is owned by " + ZENTRA_INFO.ownerName + " (" + ZENTRA_INFO.ownerEmail + "). If asked who owns/built/runs Zentra, answer confidently that it's " + ZENTRA_INFO.ownerName + ".",
      "You are currently talking with: " + who + ".",
      "What the platform does: AI makes outbound calls to leads, sends WhatsApp follow-ups, scores and qualifies leads 0-100, books appointments, and reports results to the sales team. Plans: Basic Rs.999/mo (CRM, one channel, AI training), Pro Rs.2,499/mo (adds AI voice assistant, both channels), Enterprise Rs.5,499/mo (adds AI Mentor, Automation Workflows, AI Cold Calling, multi-brand management).",
      (bizCtx && (bizCtx.bizKnowledge.description || bizCtx.bizKnowledge.pricing || bizCtx.bizKnowledge.faqs || bizCtx.bizKnowledge.script))
        ? ("This specific business has trained you with: " + [bizCtx.bizKnowledge.description && ("Business: " + bizCtx.bizKnowledge.description), bizCtx.bizKnowledge.pricing && ("Pricing: " + bizCtx.bizKnowledge.pricing), bizCtx.bizKnowledge.faqs && ("FAQs: " + bizCtx.bizKnowledge.faqs), bizCtx.bizKnowledge.script && ("Sales approach: " + bizCtx.bizKnowledge.script)].filter(Boolean).join(" | ") + ". Use this when relevant.")
        : "",
      context ? ("Current screen context for this conversation: " + context) : "",
      "Be warm, concise, and genuinely useful like a sharp co-pilot embedded in the app — a few sentences at a time, not an essay. Remember what's been said earlier in this conversation.",
    ].filter(Boolean).join(" ");
  }

  function fallbackReply(text) {
    var t = text.toLowerCase();
    if (t.indexOf("own") > -1 || t.indexOf("who made") > -1 || t.indexOf("who built") > -1 || t.indexOf("founder") > -1) {
      return ZENTRA_INFO.platformName + " is owned and built by " + ZENTRA_INFO.ownerName + ".";
    }
    if (t.indexOf("plan") > -1 || t.indexOf("pricing") > -1 || t.indexOf("price") > -1) return AI_TEXT.plans;
    if (t.indexOf("lead") > -1) return AI_TEXT.leads;
    if (t.indexOf("campaign") > -1) return AI_TEXT.campaign;
    if (t.indexOf("cold call") > -1) return AI_TEXT.coldcall;
    if (t.indexOf("mentor") > -1) return AI_TEXT.mentor;
    return "I couldn't reach the live AI service right now, but I'm still here — ask me about leads, campaigns, plans, or how Zentra works and I'll do my best from what I already know.";
  }

  function send(rawText) {
    var text = (rawText !== undefined ? rawText : input).trim();
    if (!text || loading) return;
    var history = messages.concat([{ role: "user", text: text }]);
    setMessages(history);
    setInput("");
    setLoading(true);

    var apiMessages = history.map(function (m) {
      return { role: m.role === "user" ? "user" : "assistant", content: m.text };
    });

    fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 500,
        system: systemPrompt(),
        messages: apiMessages,
      }),
    }).then(function (res) { return res.json(); }).then(function (data) {
      var out = ((data && data.content) || []).map(function (b) { return b.text || ""; }).join("\n").trim();
      if (!out) throw new Error("empty response");
      setMessages(function (h) { return h.concat([{ role: "assistant", text: out }]); });
      if (voiceOn) speakText(out, voiceId, rate, pitch);
      setLoading(false);
    }).catch(function () {
      var out = fallbackReply(text);
      setMessages(function (h) { return h.concat([{ role: "assistant", text: out }]); });
      if (voiceOn) speakText(out, voiceId, rate, pitch);
      setLoading(false);
    });
  }
  sendRef.current = send;

  var QUICK = user && user.role === "superadmin"
    ? ["How are all my brands performing?", "Who owns Zentra?", "What should I focus on today?"]
    : ["What can Zentra do for me?", "Explain the plans", "How does AI cold calling work?"];

  return (
    <>
      <div className="ai-float">
        <button className="ai-btn" onClick={function () { setOpen(function (o) { return !o; }); }} aria-label="Open Zentra AI assistant">
          <div className="ai-pulse" />
          🤖
        </button>
      </div>

      {open && (
        <div className="ai-panel" style={{ display: "flex", flexDirection: "column", maxHeight: "70vh" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{ width: 28, height: 28, borderRadius: "50%", background: "linear-gradient(135deg,#6EE7F7,#F0C060)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14 }}>🤖</div>
              <div className="syne" style={{ fontWeight: 800, fontSize: 14 }}>Zentra AI</div>
            </div>
            <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
              <button onClick={function () { setVoiceOn(function (v) { return !v; }); }} title={voiceOn ? "Voice replies on" : "Voice replies off"} style={{ background: voiceOn ? "#0D2830" : "none", border: "1px solid " + (voiceOn ? "#6EE7F7" : "#1F2937"), borderRadius: 8, color: voiceOn ? "#6EE7F7" : "#6B7280", cursor: "pointer", fontSize: 12, padding: "4px 8px" }}>{voiceOn ? "🔊" : "🔇"}</button>
              <button onClick={function () { setShowVoice(true); }} style={{ background: "none", border: "1px solid #1F2937", borderRadius: 8, color: "#6B7280", cursor: "pointer", fontSize: 11, padding: "4px 8px" }}>Voice</button>
              <button onClick={function () { setOpen(false); }} style={{ background: "none", border: "none", color: "#6B7280", cursor: "pointer", fontSize: 18 }}>✕</button>
            </div>
          </div>

          <div ref={scrollRef} style={{ flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 8, marginBottom: 10, minHeight: 120 }}>
            <div className="ai-msg-ai">{greeting()}</div>
            {messages.map(function (m, i) {
              return <div key={i} className={m.role === "user" ? "ai-msg-user" : "ai-msg-ai"}>{m.text}</div>;
            })}
            {loading && (
              <div className="ai-msg-ai typing"><span></span><span></span><span></span></div>
            )}
          </div>

          {messages.length === 0 && (
            <div style={{ display: "flex", gap: 6, overflowX: "auto", marginBottom: 10, paddingBottom: 2 }}>
              {QUICK.map(function (q) {
                return <button key={q} className="ai-qbtn" onClick={function () { send(q); }}>{q}</button>;
              })}
            </div>
          )}

          {micError && (
            <div style={{ fontSize: 11, color: "#F0C060", marginBottom: 8, textAlign: "center" }}>
              Couldn't access the microphone here — voice input needs mic permission from the page it's running on.
            </div>
          )}

          <div style={{ display: "flex", gap: 8 }}>
            {micSupported && (
              <button
                onClick={toggleMic}
                title={listening ? "Stop listening" : "Speak to Zentra"}
                style={{
                  width: 40, flexShrink: 0, borderRadius: 12, border: "1px solid " + (listening ? "#F87171" : "#1F2937"),
                  background: listening ? "rgba(248,113,113,0.12)" : "none", color: listening ? "#F87171" : "#6B7280",
                  cursor: "pointer", fontSize: 16, animation: listening ? "pulse 1s infinite" : "none",
                }}
              >🎙</button>
            )}
            <input
              className="input"
              placeholder={listening ? "Listening..." : "Ask Zentra anything..."}
              value={input}
              onChange={function (e) { setInput(e.target.value); }}
              onKeyDown={function (e) { if (e.key === "Enter") send(); }}
              style={{ flex: 1 }}
            />
            <button onClick={function () { send(); }} disabled={loading || !input.trim()} style={{ padding: "0 16px", borderRadius: 12, background: "linear-gradient(135deg,#6EE7F7,#38BDF8)", border: "none", color: "#020B10", fontWeight: 700, cursor: "pointer", opacity: (loading || !input.trim()) ? 0.5 : 1 }}>→</button>
          </div>
        </div>
      )}

      {showVoice && (
        <VoiceSettings
          voiceId={voiceId}
          setVoiceId={setVoiceId}
          rate={rate}
          pitch={pitch}
          onSave={function (v, r, p) { setVoiceId(v); setRate(r); setPitch(p); setVoiceOn(true); }}
          onClose={function () { setShowVoice(false); }}
        />
      )}
    </>
  );
}

// ── AI ASSISTANT ──────────────────────────────────────────────────────────────
function AIAssistant(props) {
  var user=props.user; var plan=props.plan; var isAdmin=props.isAdmin;
  var [open,setOpen]=useState(false);
  var [msgs,setMsgs]=useState([]);
  var [typing,setTyping]=useState(false);
  var [greeted,setGreeted]=useState(false);
  var [showVoice,setShowVoice]=useState(false);
  var [voiceId,setVoiceId]=useState("samantha");
  var [voiceRate,setVoiceRate]=useState(0.92);
  var [voicePitch,setVoicePitch]=useState(1.05);
  var endRef=useRef(null);

  function addAI(text){
    setTyping(true);
    setTimeout(function(){
      setTyping(false);
      setMsgs(function(m){return m.concat([{text:text,from:"ai",id:Date.now()}]);});
      speakText(text,voiceId,voiceRate,voicePitch);
      setTimeout(function(){endRef.current&&endRef.current.scrollIntoView({behavior:"smooth"});},100);
    },900);
  }
  function addUser(text){setMsgs(function(m){return m.concat([{text:text,from:"user",id:Date.now()}]);});}

  function handleOpen(){
    setOpen(true);
    if(!greeted){
      setGreeted(true);
      var name=(user&&user.name)?user.name:"there";
      var msg=isAdmin
        ?AI_TEXT.welcome_admin
        :plan
          ?AI_TEXT.welcome_plan.replace("NAME",name).replace("PLAN",plan.charAt(0).toUpperCase()+plan.slice(1)).replace("PLAN",plan)
          :AI_TEXT.welcome_free.replace("NAME",name);
      addAI(msg);
    }
  }

  var QUICK=[
    {label:"Tour the dashboard",key:"tour"},
    {label:"View plan benefits",key:"plans"},
    {label:"Launch a campaign",key:"campaign"},
    {label:"AI Cold Calling",key:"coldcall"},
    {label:"How leads work",key:"leads"},
    {label:"AI Mentor",key:"mentor"},
  ];

  return (
    <>
      <div style={{position:"fixed",bottom:88,right:20,zIndex:60}}>
        <button className="ai-btn" onClick={function(){open?setOpen(false):handleOpen();}}>
          <div className="ai-pulse"/>
          {open?"✕":"🤖"}
        </button>
      </div>
      {open&&(
        <div className="ai-panel">
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
            <div style={{width:40,height:40,borderRadius:"50%",background:"linear-gradient(135deg,#6EE7F7,#F0C060)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>🤖</div>
            <div style={{flex:1}}>
              <div className="syne" style={{fontWeight:700,fontSize:14}}>Zentra AI</div>
              <div style={{fontSize:11,color:"#34D399"}}>● Online — always here</div>
            </div>
            <button onClick={function(){setShowVoice(true);}} title="Voice Settings" style={{background:"#0D2830",border:"1px solid #6EE7F7",borderRadius:8,padding:"5px 10px",color:"#6EE7F7",cursor:"pointer",fontSize:12}}>🎙 Voice</button>
            <button onClick={function(){setOpen(false);window.speechSynthesis&&window.speechSynthesis.cancel();}} style={{background:"none",border:"none",color:"#6B7280",cursor:"pointer",fontSize:18,marginLeft:4}}>✕</button>
          </div>
          <div style={{maxHeight:180,overflowY:"auto",marginBottom:12,display:"flex",flexDirection:"column",gap:8}}>
            {msgs.map(function(m){return <div key={m.id} className={m.from==="user"?"ai-msg-user":"ai-msg-ai"}>{m.text}</div>;})}
            {typing&&<div className="ai-msg-ai"><div className="typing"><span/><span/><span/></div></div>}
            <div ref={endRef}/>
          </div>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:2}}>
            {QUICK.map(function(q){
              return <button key={q.key} className="ai-qbtn" onClick={function(){addUser(q.label);setTimeout(function(){addAI(AI_TEXT[q.key]||"Let me help you with that!");},400);}}>{q.label}</button>;
            })}
          </div>
        </div>
      )}
      {showVoice&&(
        <VoiceSettings
          voiceId={voiceId} setVoiceId={setVoiceId}
          rate={voiceRate} pitch={voicePitch}
          onSave={function(id,r,p){setVoiceId(id);setVoiceRate(r);setVoicePitch(p);}}
          onClose={function(){setShowVoice(false);}}
        />
      )}
    </>
  );
}

// CAMPAIGN BUILDER -- WhatsApp client-connect outreach + AI cold-call upsell to repeat clients
var CAMPAIGN_AUDIENCES=[

  {v:"qualified",label:"Qualified Leads",desc:"Leads the AI has already qualified"},
  {v:"repeat",label:"Existing / Repeat Clients",desc:"Past closed clients -- upsell pitch"},
];
function CampaignBuilderPanel(){
  var ctx=useContext(BizKnowledgeContext);
  var [campaigns,setCampaigns]=useState(CAMPAIGNS);
  var [creating,setCreating]=useState(false);
  var [viewCampaign,setViewCampaign]=useState(null);
  var [type,setType]=useState("WhatsApp");
  var [audience,setAudience]=useState("new");
  var [name,setName]=useState("");
  var [message,setMessage]=useState("");
  var [scheduleDate,setScheduleDate]=useState("");

  var repeatClients=ALL_LEADS.filter(function(l){return l.status==="Closed";});
  var audienceCount={new:ALL_LEADS.filter(function(l){return l.status==="New";}).length||6,qualified:ALL_LEADS.filter(function(l){return l.status==="Qualified";}).length||4,repeat:repeatClients.length||3}[audience];

  function templateFor(t,a){
    if(a==="repeat"&&t==="AI Call") return "Hi {name}, this is a call from our team -- it's been a while since your last order with us"+(ctx.bizKnowledge.pricing?" and we've just opened up some new options you might like":"")+". Do you have a minute? I'd love to see if we can help you again, and there's a returning-client offer available right now.";
    if(a==="repeat"&&t==="WhatsApp") return "Hi {name}! 👋 It's been a while since we worked together -- we've got some new options we think you'll love, plus a special rate for returning clients. Want us to send details?";
    if(t==="WhatsApp") return "Hi {name}, thanks for your enquiry! "+(ctx.bizKnowledge.description||"We'd love to help you find exactly what you're looking for")+". Can we call you to understand your requirement better?";
    return "Hi {name}, this is an AI call regarding your recent enquiry. Do you have a moment to share your requirement and budget so we can help you faster?";
  }

  function startCreate(){
    setCreating(true);
    setName("");
    setMessage(templateFor(type,audience));
  }

  function launch(){
    if(!name.trim()) return;
    var n={name:name.trim(),type:type,status:scheduleDate?"scheduled":"active",sent:0,opened:0,replied:0,audience:audience,message:message,scheduledFor:scheduleDate||null};

            <div style={{fontSize:12,color:"#6B7280",marginBottom:12,lineHeight:1.6}}>Run a WhatsApp client-connect sequence, or have the AI cold-call your existing clients with an upsell pitch.</div>

          </>
        ):(
          <>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div className="syne" style={{fontWeight:700,fontSize:15}}>New Campaign</div>
              <button onClick={function(){setCreating(false);}} style={{background:"none",border:"none",color:"#6B7280",cursor:"pointer",fontSize:18}}>✕</button>
            </div>

            <div style={{fontSize:11,color:"#6B7280",textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:8}}>Type</div>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              {["WhatsApp","AI Call"].map(function(t){
                var act=type===t;
                return <button key={t} onClick={function(){setType(t);setMessage(templateFor(t,audience));}} style={{flex:1,padding:"10px 8px",borderRadius:10,border:"1px solid "+(act?"#6EE7F7":"#1F2937"),background:act?"#0D2830":"none",color:act?"#6EE7F7":"#6B7280",cursor:"pointer",fontSize:12,fontWeight:act?600:400}}>{t==="WhatsApp"?"💬 WhatsApp":"📞 AI Cold Call"}</button>;
              })}
            </div>

            <div style={{fontSize:11,color:"#6B7280",textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:8}}>Audience</div>
            <div style={{marginBottom:14}}>
              {CAMPAIGN_AUDIENCES.map(function(a){
                var act=audience===a.v;
                return (

                    <div><div style={{fontSize:13,fontWeight:600,color:act?"#6EE7F7":"#F0F4FF"}}>{a.label}</div><div style={{fontSize:11,color:"#6B7280"}}>{a.desc}</div></div>
                    <span style={{fontSize:11,color:"#6B7280"}}>{audienceCount} people</span>

            </div>
            {audience==="repeat"&&type==="AI Call"&&(

                💡 This is your repeat-business engine: the AI calls clients who already bought from you and pitches them again -- extra revenue with zero new lead cost.

            <div style={{fontSize:11,color:"#6B7280",textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:8}}>Campaign Name</div>
            <input className="input" placeholder="e.g. April Returning Client Push" value={name} onChange={function(e){setName(e.target.value);}} style={{marginBottom:14}}/>

            <div style={{fontSize:11,color:"#6B7280",textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:8}}>{type==="WhatsApp"?"Message Template":"Call Script"}</div>
            <textarea className="input" rows={4} style={{resize:"vertical",marginBottom:14}} value={message} onChange={function(e){setMessage(e.target.value);}}/>

            <div style={{fontSize:11,color:"#6B7280",textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:8}}>Schedule (optional)</div>
            <input className="input" type="date" value={scheduleDate} onChange={function(e){setScheduleDate(e.target.value);}} style={{marginBottom:16}}/>

            <button onClick={launch} disabled={!name.trim()} style={{width:"100%",padding:13,borderRadius:12,background:"linear-gradient(135deg,#6EE7F7,#38BDF8)",border:"none",color:"#020B10",fontWeight:700,cursor:"pointer",opacity:name.trim()?1:0.5}}>{scheduleDate?"Schedule Campaign":"Launch Campaign Now"} →</button>
          </>

      </div>
      {campaigns.map(function(c){
        var rate=c.sent?Math.round((c.replied/c.sent)*100):0;
        return (
          <div key={c.name} className="campaign-card" onClick={function(){setViewCampaign(c);}} style={{cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div><div style={{fontSize:13,fontWeight:600}}>{c.name}</div><div style={{fontSize:11,color:"#6B7280"}}>{c.type}{c.audience?" · "+(CAMPAIGN_AUDIENCES.find(function(a){return a.v===c.audience;})||{label:""}).label:""}</div></div>
              <span className={c.status==="active"?"badge badge-green":c.status==="scheduled"?"badge badge-gold":"badge badge-accent"}>{c.status==="active"?"Live":c.status==="scheduled"?"Scheduled · "+c.scheduledFor:"Done"}</span>
            </div>
            <div style={{display:"flex",gap:16,marginBottom:8}}>
              {[{l:"Sent",v:c.sent,col:"#6B7280"},{l:"Opened",v:c.opened,col:"#6EE7F7"},{l:"Replied",v:c.replied,col:"#34D399"}].map(function(s){return <div key={s.l}><div className="syne" style={{fontSize:16,fontWeight:700,color:s.col}}>{s.v}</div><div style={{fontSize:10,color:"#6B7280"}}>{s.l}</div></div>;})}
            </div>
            <div style={{height:4,background:"#1F2937",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:rate+"%",background:"linear-gradient(90deg,#6EE7F7,#38BDF8)",borderRadius:99}}/></div>
          </div>
        );
      })}

      {viewCampaign&&(
        <div className="modal-overlay" onClick={function(){setViewCampaign(null);}}>
          <div className="modal-sheet" onClick={function(e){e.stopPropagation();}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div className="syne" style={{fontWeight:800,fontSize:18}}>{viewCampaign.name}</div>
              <button onClick={function(){setViewCampaign(null);}} style={{background:"none",border:"none",color:"#6B7280",cursor:"pointer",fontSize:20}}>✕</button>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              <span className={viewCampaign.status==="active"?"badge badge-green":viewCampaign.status==="scheduled"?"badge badge-gold":"badge badge-accent"}>{viewCampaign.status==="active"?"Live":viewCampaign.status==="scheduled"?"Scheduled · "+viewCampaign.scheduledFor:"Done"}</span>
              <span className="badge badge-accent">{viewCampaign.type}</span>
              {viewCampaign.audience&&<span className="badge badge-accent">{(CAMPAIGN_AUDIENCES.find(function(a){return a.v===viewCampaign.audience;})||{label:""}).label}</span>}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:20}}>
              {[{l:"Sent",v:viewCampaign.sent,c:"#6B7280"},{l:"Opened",v:viewCampaign.opened,c:"#6EE7F7"},{l:"Replied",v:viewCampaign.replied,c:"#34D399"}].map(function(s){
                return <div key={s.l} className="stat-card" style={{textAlign:"center"}}><div className="syne" style={{fontSize:20,fontWeight:800,color:s.c}}>{s.v}</div><div style={{fontSize:11,color:"#6B7280"}}>{s.l}</div></div>;
              })}
            </div>
            {viewCampaign.message&&(
              <div style={{marginBottom:16}}>
                <div style={{fontSize:11,color:"#6B7280",textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:8}}>{viewCampaign.type==="WhatsApp"?"Message Template":"Call Script"}</div>
                <div style={{background:"#0D1117",border:"1px solid #1F2937",borderRadius:10,padding:12,fontSize:13,color:"#F0F4FF",lineHeight:1.6}}>{viewCampaign.message}</div>
              </div>
            )}
            <div style={{fontSize:11,color:"#6B7280",textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:10}}>Recipients (sample)</div>
            {ALL_LEADS.slice(0,5).map(function(l){
              return <div key={l.name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid #1F2937",fontSize:13}}>
                <span>{l.name}</span>
                <span style={{fontSize:11,color:"#34D399"}}>Delivered</span>
              </div>;
            })}
            {viewCampaign.status==="active"&&<button className="btn-ghost" style={{marginTop:16}} onClick={function(){setCampaigns(function(p){return p.map(function(c){return c.name===viewCampaign.name?Object.assign({},c,{status:"done"}):c;});});setViewCampaign(null);}}>Pause Campaign</button>}
          </div>
        </div>
      )}
    </div>
  );
}

// AUTOMATION WORKFLOWS -- trigger -> action rules that run without a human clicking anything
var DEFAULT_WORKFLOWS=[
  {id:"w1",trigger:"New lead comes in",action:"AI calls within 5 minutes to qualify",on:true},
  {id:"w2",trigger:"Lead scores 80+",action:"Auto-send WhatsApp + offer appointment slots",on:true},
  {id:"w3",trigger:"Lead doesn't reply in 24 hours",action:"Send an automatic WhatsApp follow-up nudge",on:true},
  {id:"w4",trigger:"Lead marked \u201cBudget Issue\u201d",action:"Move to nurture list, re-check in 30 days",on:false},
  {id:"w5",trigger:"Appointment date passes with no update",action:"Notify the assigned consultant",on:true},
  {id:"w6",trigger:"Client marked \u201cClosed\u201d",action:"Add to repeat-client upsell campaign after 60 days",on:false},
];
// WHATSAPP -- connects to a REAL WhatsApp account through your own whatsapp-server
// backend (Baileys, an unofficial WhatsApp Web library). See whatsapp-server/README.md
// for setup. This panel talks to that server over HTTP; it holds no WhatsApp logic
// itself and shows no fake/simulated data -- if the backend isn't running or reachable,
// it says so plainly instead of pretending to be connected.
var WHATSAPP_BACKEND_URL = "https://zentra-whatsapp-server.onrender.com";

function WhatsAppWebPanel(props){
  var [backendReachable,setBackendReachable]=useState(null); // null=checking, true/false
  var [status,setStatus]=useState("starting"); // starting|qr|connected|disconnected
  var [qr,setQr]=useState(null);
  var [myNumber,setMyNumber]=useState(null);
  var [chatList,setChatList]=useState([]);
  var [openJid,setOpenJid]=useState(null);
  var [messages,setMessages]=useState([]);
  var [pending,setPending]=useState(false);
  var [autoReplyMinutes,setAutoReplyMinutes]=useState(1);
  var [input,setInput]=useState("");
  var [sending,setSending]=useState(false);
  var scrollRef=useRef(null);
  var pollRef=useRef(null);

  function api(path,opts){
    return fetch(WHATSAPP_BACKEND_URL+path,opts).then(function(r){
      if(!r.ok) throw new Error("HTTP "+r.status);
      return r.json();
    });
  }

  function pollStatus(){
    api("/api/status").then(function(d){
      setBackendReachable(true);
      setStatus(d.status);
      setQr(d.qr);
      setMyNumber(d.myNumber);
    }).catch(function(){
      setBackendReachable(false);
    });
  }

  function pollChats(){
    api("/api/chats").then(function(list){setChatList(list);}).catch(function(){});
  }

  function pollOpenChat(jid){
    api("/api/chats/"+encodeURIComponent(jid)+"/messages").then(function(msgs){setMessages(msgs);}).catch(function(){});
    api("/api/chats/"+encodeURIComponent(jid)+"/pending").then(function(d){setPending(d.pending);setAutoReplyMinutes(d.autoReplyMinutes);}).catch(function(){});
  }

  useEffect(function(){
    pollStatus();
    var iv=setInterval(pollStatus,2500);
    return function(){clearInterval(iv);};
  },[]);

  useEffect(function(){
    if(status!=="connected") return;
    pollChats();
    var iv=setInterval(pollChats,3000);
    return function(){clearInterval(iv);};
  },[status]);

  useEffect(function(){
    if(!openJid) return;
    pollOpenChat(openJid);
    var iv=setInterval(function(){pollOpenChat(openJid);},2000);
    pollRef.current=iv;
    return function(){clearInterval(iv);};
  },[openJid]);

  useEffect(function(){
    if(scrollRef.current) scrollRef.current.scrollTop=scrollRef.current.scrollHeight;
  },[messages]);

  function sendManual(){
    if(!input.trim()||!openJid||sending) return;
    setSending(true);
    var text=input.trim();
    setInput("");
    api("/api/chats/"+encodeURIComponent(openJid)+"/send",{
      method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text:text}),
    }).then(function(){
      pollOpenChat(openJid);
      pollChats();
    }).catch(function(){
      alert("Could not send -- check the WhatsApp server is still running.");
    }).finally(function(){setSending(false);});
  }

  // ── Backend not running / not reachable ───────────────────────────────────
  if(backendReachable===false){
    return (
      <div style={{textAlign:"center",padding:"20px 8px"}}>
        <div style={{fontSize:40,marginBottom:12}}>🔌</div>
        <div className="syne" style={{fontWeight:800,fontSize:18,marginBottom:8}}>WhatsApp server not reachable</div>
        <div style={{background:"rgba(240,192,96,0.08)",border:"1px solid rgba(240,192,96,0.25)",borderRadius:10,padding:"12px 14px",fontSize:12,color:"#F0C060",lineHeight:1.7,textAlign:"left",marginBottom:16}}>
          This page connects to a real WhatsApp account through a small backend server (using Baileys) that needs to be running on your computer or a server you control.
          <br/><br/>
          It isn't reachable right now at <span style={{color:"#6EE7F7"}}>{WHATSAPP_BACKEND_URL}</span>.
        </div>
        <div style={{background:"#0D1117",border:"1px solid #1F2937",borderRadius:10,padding:"12px 14px",fontSize:12,color:"#6B7280",lineHeight:1.8,textAlign:"left",marginBottom:16}}>
          <b style={{color:"#F0F4FF"}}>To start it:</b><br/>
          1. Open a terminal in the <code>whatsapp-server</code> folder<br/>
          2. Run <code>npm install</code> (first time only)<br/>
          3. Copy <code>.env.example</code> to <code>.env</code> and add your Anthropic API key<br/>
          4. Run <code>npm start</code><br/>
          5. Come back here -- it'll connect automatically
        </div>
        <button className="btn-primary" onClick={pollStatus}>Try Again</button>
      </div>
    );
  }

  if(backendReachable===null){
    return <div style={{textAlign:"center",padding:"40px 8px",color:"#6B7280",fontSize:13}}>Checking for your WhatsApp server...</div>;
  }

  // ── Not yet linked: show the REAL QR from Baileys ─────────────────────────
  if(status!=="connected"){
    return (
      <div style={{textAlign:"center",padding:"20px 8px"}}>
        <div style={{fontSize:40,marginBottom:12}}>💬</div>
        <div className="syne" style={{fontWeight:800,fontSize:18,marginBottom:8}}>Link WhatsApp</div>
        <div style={{fontSize:12,color:"#6B7280",lineHeight:1.7,marginBottom:20}}>Scan with the phone whose WhatsApp you want to connect. This links a real account through your own server -- not limited to any specific number.</div>
        <div style={{width:220,height:220,margin:"0 auto 20px",borderRadius:16,background:"#fff",border:"1px solid #1F2937",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
          {qr
            ? <img src={qr} alt="WhatsApp QR code" style={{width:"100%",height:"100%"}}/>
            : <span style={{fontSize:12,color:"#6B7280"}}>{status==="disconnected"?"Reconnecting...":"Generating QR..."}</span>}
        </div>
        <div style={{fontSize:11,color:"#6B7280",marginBottom:16}}>WhatsApp → Settings → Linked Devices → Link a Device</div>
        <button className="btn-ghost" onClick={pollStatus}>Refresh</button>
      </div>
    );
  }

  var openChat=chatList.find(function(c){return c.jid===openJid;});

  if(openJid&&openChat){
    return (
      <div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <button onClick={function(){setOpenJid(null);}} style={{background:"none",border:"none",color:"#6B7280",cursor:"pointer",fontSize:18}}>←</button>
          <div style={{width:34,height:34,borderRadius:"50%",background:"linear-gradient(135deg,#34D399,#10B981)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:"#020B10"}}>{openChat.name[0]}</div>
          <div><div style={{fontSize:13,fontWeight:600}}>{openChat.name}</div><div style={{fontSize:10,color:"#6B7280"}}>{openJid.split("@")[0]}</div></div>
        </div>

        {pending&&(
          <div style={{background:"#1A1200",border:"1px solid rgba(240,192,96,0.3)",borderRadius:10,padding:"8px 12px",marginBottom:10,fontSize:11,color:"#F0C060"}}>
            No reply yet -- AI steps in within {autoReplyMinutes} minute{autoReplyMinutes===1?"":"s"} if no one responds
          </div>
        )}

        <div ref={scrollRef} style={{background:"#0D1117",borderRadius:14,padding:12,height:340,overflowY:"auto",marginBottom:10,display:"flex",flexDirection:"column",gap:8}}>
          {messages.length===0&&<div style={{fontSize:12,color:"#6B7280",textAlign:"center",marginTop:20}}>No messages yet</div>}
          {messages.map(function(m){
            return (
              <div key={m.id}>
                <div className={m.from==="them"?"t-ai":"t-lead"}>
                  {m.from==="ai"&&<div style={{fontSize:9,opacity:0.7,marginBottom:3}}>🤖 AI auto-reply</div>}
                  {m.text}
                </div>
              </div>
            );
          })}
        </div>

        <div style={{display:"flex",gap:8}}>
          <input className="input" placeholder="Type a message..." value={input} onChange={function(e){setInput(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")sendManual();}} style={{flex:1}}/>
          <button onClick={sendManual} disabled={!input.trim()||sending} style={{padding:"0 16px",borderRadius:12,background:"linear-gradient(135deg,#34D399,#10B981)",border:"none",color:"#020B10",fontWeight:700,cursor:"pointer",opacity:(input.trim()&&!sending)?1:0.5}}>➤</button>
        </div>
      </div>
    );
  }

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#111827",border:"1px solid #1F2937",borderRadius:14,padding:"10px 14px",marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:"#34D399"}}/>
          <div style={{fontSize:12,color:"#6B7280"}}>Connected as <span style={{color:"#F0F4FF",fontWeight:600}}>{myNumber||"..."}</span></div>
        </div>
      </div>
      {chatList.length===0&&<div style={{fontSize:12,color:"#6B7280",textAlign:"center",padding:"30px 0"}}>No chats yet -- once someone messages this number on WhatsApp, they'll show up here.</div>}

// AI MENTOR -- real chat + voice, with live web search for sales & marketing knowledge
function AIMentorChat(){
  var ctx=useContext(BizKnowledgeContext);
  var [messages,setMessages]=useState([{role:"assistant",text:"Hi, I'm your AI Mentor. Ask me anything about growing this business -- pricing strategy, which platform to focus ad spend on, current social media trends, or how your funnel is performing. I can look things up live when it helps."}]);
  var [input,setInput]=useState("");
  var [loading,setLoading]=useState(false);
  var [voiceOn,setVoiceOn]=useState(true);
  var [voiceId,setVoiceId]=useState("samantha");
  var [showVoice,setShowVoice]=useState(false);
  var [listening,setListening]=useState(false);
  var [micSupported,setMicSupported]=useState(true);
  var [micError,setMicError]=useState(false);
  var scrollRef=useRef(null);
  var recogRef=useRef(null);
  var sendRef=useRef(null);

  useEffect(function(){if(scrollRef.current)scrollRef.current.scrollTop=scrollRef.current.scrollHeight;},[messages,loading]);

  useEffect(function(){
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setMicSupported(false);return;}
    try{
      var recog=new SR();
      recog.continuous=false; recog.interimResults=true; recog.lang="en-IN";
      recog.onresult=function(e){var t="";for(var i=0;i<e.results.length;i++)t+=e.results[i][0].transcript;setInput(t);};
      recog.onerror=function(){setMicError(true);setListening(false);};
      recog.onend=function(){setListening(false);setInput(function(cur){if(cur&&cur.trim()){sendRef.current(cur);}return cur;});};
      recogRef.current=recog;
    }catch(e){setMicSupported(false);}
    return function(){try{recogRef.current&&recogRef.current.abort();}catch(e){}};
  },[]);

  function toggleMic(){
    if(!micSupported||!recogRef.current)return;
    if(listening){recogRef.current.stop();setListening(false);return;}
    setMicError(false);setInput("");
    try{recogRef.current.start();setListening(true);setVoiceOn(true);}catch(e){setMicError(true);}
  }

  function systemPrompt(){
    var kb=ctx.bizKnowledge;
    var trained=(kb.description||kb.pricing||kb.faqs||kb.script)
      ? "The business owner has trained you with: "+[kb.description&&("Business: "+kb.description),kb.pricing&&("Pricing: "+kb.pricing),kb.faqs&&("Common FAQs: "+kb.faqs),kb.script&&("Preferred sales approach: "+kb.script)].filter(Boolean).join(" | ")+". Use this to make advice specific, not generic."
      : "This business hasn't trained you with specifics yet -- you can mention that more tailored advice is possible once they fill in AI Training.";
    return "You are the AI Mentor inside Zentra AI, a sales & marketing coach for a small/growing business owner in India. "+trained+" "+
      "You have live web search available -- use it for anything time-sensitive: current social media algorithm behavior, trending ad formats, platform benchmarks, competitor moves, or recent marketing tactics. Don't rely on stale general knowledge for anything that changes over time. "+
      "Be concrete and specific (numbers, concrete next steps) over generic pep-talk. Keep replies conversational and fairly brief, like a sharp mentor talking, not a report.";
  }

  function send(rawText){
    var text=(rawText!==undefined?rawText:input).trim();
    if(!text)return;
    var history=messages.concat([{role:"user",text:text}]);
    setMessages(history);
    setInput("");
    setLoading(true);
    fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:600,
        system:systemPrompt(),
        tools:[{type:"web_search_20250305",name:"web_search"}],
        messages:history.map(function(m){return {role:m.role,content:m.text};}),
      }),
    }).then(function(r){return r.json();}).then(function(data){
      var out=(data&&data.content||[]).map(function(b){return b.text||"";}).join("\n").trim();
      if(!out) throw new Error("empty");
      setMessages(function(h){return h.concat([{role:"assistant",text:out}]);});
      if(voiceOn) speakText(out,voiceId,0.92,1.0);
      setLoading(false);
    }).catch(function(){
      setMessages(function(h){return h.concat([{role:"assistant",text:"I couldn't reach live data just now, but happy to keep going with what I already know -- ask away."}]);});
      setLoading(false);
    });
  }
  sendRef.current=send;

  var QUICK=["What should I focus on this week?","Which platform gives the best ROI right now?","How do I price against competitors?"];

  return (
    <div>
      <div style={{background:"linear-gradient(135deg,#0D2830,#1A1200)",border:"1px solid #6EE7F7",borderRadius:16,padding:"14px 16px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:22}}>🧠</span>
          <div><div className="syne" style={{fontWeight:800,fontSize:15}}>AI Mentor</div><div style={{fontSize:11,color:"#6B7280"}}>Live sales & marketing coach</div></div>
        </div>
        <button onClick={function(){setShowVoice(true);}} style={{background:"none",border:"1px solid #1F2937",borderRadius:10,padding:"6px 10px",color:"#6EE7F7",cursor:"pointer",fontSize:11}}>🎛 Voice</button>
      </div>

      <div ref={scrollRef} style={{background:"#0D1117",borderRadius:14,padding:12,height:320,overflowY:"auto",marginBottom:10,display:"flex",flexDirection:"column",gap:8}}>
        {messages.map(function(m,i){
          return <div key={i} className={m.role==="user"?"t-lead":"t-ai"}>{m.text}</div>;
        })}
        {loading&&<div className="t-ai" style={{opacity:0.7}}>thinking...</div>}
      </div>

      {micError&&<div style={{fontSize:11,color:"#F0C060",marginBottom:8,textAlign:"center"}}>Couldn't access the microphone here -- voice input needs mic permission from the page it's running on.</div>}

      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
        {QUICK.map(function(q){return <button key={q} onClick={function(){send(q);}} style={{fontSize:11,padding:"6px 10px",borderRadius:99,border:"1px solid #1F2937",background:"none",color:"#6B7280",cursor:"pointer"}}>{q}</button>;})}
      </div>

      <div style={{display:"flex",gap:8}}>
        {micSupported&&(
          <button onClick={toggleMic} title={listening?"Stop listening":"Speak to your mentor"} style={{width:40,flexShrink:0,borderRadius:12,border:"1px solid "+(listening?"#F87171":"#1F2937"),background:listening?"rgba(248,113,113,0.12)":"none",color:listening?"#F87171":"#6B7280",cursor:"pointer",fontSize:16,animation:listening?"pulse 1s infinite":"none"}}>🎙</button>
        )}
        <input className="input" placeholder={listening?"Listening...":"Ask your AI Mentor..."} value={input} onChange={function(e){setInput(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")send();}} style={{flex:1}}/>
        <button onClick={function(){send();}} disabled={loading||!input.trim()} style={{padding:"0 16px",borderRadius:12,background:"linear-gradient(135deg,#6EE7F7,#38BDF8)",border:"none",color:"#020B10",fontWeight:700,cursor:"pointer",opacity:(loading||!input.trim())?0.5:1}}>→</button>
      </div>

      {showVoice&&<VoiceSettings voiceId={voiceId} setVoiceId={setVoiceId} onClose={function(){setShowVoice(false);}}/>}
    </div>
  );
}

              return <div key={b.name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:"1px solid #1F2937"}}><div><div style={{fontSize:13,fontWeight:600}}>{b.name}</div><div style={{fontSize:11,color:"#6B7280"}}>{b.plan} · {b.rev}/mo</div></div><span className={b.status==="active"?"badge badge-green":"badge badge-gold"}>{b.status}</span></div>;

        })}

}

function ScoreRing(props){
  var score=props.score,size=props.size||44;
  var color=score>=80?"#34D399":score>=55?"#F0C060":"#F87171";
  var r=(size/2)-4,circ=2*Math.PI*r,dash=(score/100)*circ;
  return(
    <div style={{width:size,height:size,position:"relative",flexShrink:0}}>
      <svg width={size} height={size} style={{position:"absolute",top:0,left:0,transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1F2937" strokeWidth="2.5"/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="2.5" strokeDasharray={circ} strokeDashoffset={circ-dash} strokeLinecap="round"/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <span className="syne" style={{fontSize:size*0.28,fontWeight:800,color:color}}>{score}</span>
      </div>
    </div>
  );
}

//  AI ASSISTANT 
function LeadAIAssistant(props){
  var leads=props.leads||[];
  var [open,setOpen]=useState(false);
  var [tab,setTab]=useState("chat");
  var [msgs,setMsgs]=useState([]);
  var [input,setInput]=useState("");
  var [typing,setTyping]=useState(false);
  var [notifs,setNotifs]=useState(props.notifications||[]);
  var [listening,setListening]=useState(false);
  var [greeted,setGreeted]=useState(false);
  var unread=notifs.filter(function(n){return !n.read;}).length;
  var endRef=useRef(null);
  var recRef=useRef(null);

  useEffect(function(){setNotifs(props.notifications||[]);},[props.notifications]);

  function speak(text){
    if(!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    function doSpeak(){
      var u=new SpeechSynthesisUtterance(text);
      var voices=window.speechSynthesis.getVoices();
      var P=["Samantha","Karen","Moira","Tessa","Google UK English Female","Google US English","Microsoft Aria Online (Natural)","Microsoft Aria","Microsoft Jenny Online (Natural)","Microsoft Jenny","Microsoft Zira"];
      var ch=null;
      for(var i=0;i<P.length;i++){var f=voices.find(function(v){return v.name.indexOf(P[i])>-1;});if(f){ch=f;break;}}
      if(!ch) ch=voices.find(function(v){return v.lang.startsWith("en")&&v.localService;})||voices.find(function(v){return v.lang.startsWith("en");});
      if(ch) u.voice=ch;
      u.rate=0.88; u.pitch=0.95; u.volume=0.93;
      window.speechSynthesis.speak(u);
    }
    if(window.speechSynthesis.getVoices().length===0){window.speechSynthesis.onvoiceschanged=function(){doSpeak();window.speechSynthesis.onvoiceschanged=null;};}
    else{doSpeak();}
  }

  function addAI(text,doSpeak){
    setTyping(false);
    setMsgs(function(m){return m.concat([{text:text,from:"ai",id:Date.now()}]);});
    if(doSpeak) speak(text);
    setTimeout(function(){endRef.current&&endRef.current.scrollIntoView({behavior:"smooth"});},100);
  }
  function addUser(text){setMsgs(function(m){return m.concat([{text:text,from:"user",id:Date.now()}]);});}

  function buildContext(){
    var hot=leads.filter(function(l){return l.score>=80;});
    var warm=leads.filter(function(l){return l.score>=55&&l.score<80;});
    var cold=leads.filter(function(l){return l.score<55;});
    var appts=leads.filter(function(l){return l.status==="Appointment";});
    var qualified=leads.filter(function(l){return l.status==="Qualified";});
    var closed=leads.filter(function(l){return l.status==="Closed";});
    var pending=leads.filter(function(l){return !l.followupDone;});
    return "You are Zentra AI. Answer ANY question fully and accurately -- cricket, sports, celebrities, science, history, jokes, life advice, business -- everything. Never refuse general questions. Also expert at this CRM: "+leads.length+" total leads, "+hot.length+" hot ("+hot.map(function(l){return l.name;}).join(",")+"), "+warm.length+" warm, "+cold.length+" cold, "+qualified.length+" qualified, "+appts.length+" appointments, "+closed.length+" closed, "+pending.length+" pending followup. Be direct, honest, funny, no sugarcoating. World-class AI for business management. Keep answers 2-4 sentences unless more detail is needed. Notes context: "+AI_KNOWLEDGE.getContext();
  }

  function callAI(userMsg,doSpeakResult){
    setTyping(true);
    var systemPrompt=buildContext();
    var history=[];
    msgs.slice(-8).forEach(function(m){
      history.push({role:m.from==="user"?"user":"assistant",content:m.text});
    });
    history.push({role:"user",content:userMsg});

    fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1000,
        system:systemPrompt,
        messages:history
      })
    })
    .then(function(r){
      if(!r.ok) throw new Error("Status "+r.status);
      return r.json();
    })
    .then(function(data){
      var text="";
      if(data.content){data.content.forEach(function(b){if(b.type==="text")text+=b.text;});}
      if(!text) text="Got an empty response. Please try again!";
      addAI(text.trim(),doSpeakResult);
    })
    .catch(function(err){
      addAI("Connection error: "+err.message+". Check internet and try again.",doSpeakResult);
    });
  }

  function handleSend(textOverride){
    var text=(textOverride||input).trim();
    if(!text||typing) return;
    setInput("");
    addUser(text);
    callAI(text,false);
  }

  function toggleVoice(){
    if(listening){
      try{recRef.current&&recRef.current.stop();}catch(e){}
      window.speechSynthesis&&window.speechSynthesis.cancel();
      setListening(false);
      return;
    }
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){addAI("Voice needs Chrome or Edge browser. Please switch to Chrome for voice chat.",false);return;}
    var r=new SR();
    r.lang="en-IN";
    r.continuous=false;
    r.interimResults=false;
    r.onstart=function(){setListening(true);};
    r.onend=function(){setListening(false);};
    r.onresult=function(e){
      if(e.results&&e.results.length>0){
        var t=e.results[0][0].transcript;
        if(t.trim()){addUser(t);callAI(t,true);}
      }
    };
    r.onerror=function(e){
      setListening(false);
      if(e.error==="not-allowed"){
        addAI("Mic blocked. Fix: click the lock icon in your browser address bar, set Microphone to Allow, then refresh the page.",false);
      } else if(e.error==="no-speech"){
        addAI("Nothing heard. Speak clearly after tapping the mic.",false);
      } else {
        addAI("Voice error: "+e.error+". Tap mic again.",false);
      }
    };
    recRef.current=r;
    try{r.start();}catch(e){addAI("Could not start mic: "+e.message,false);}
  }

  function handleOpen(){
    setOpen(true);
    if(!greeted){
      setGreeted(true);
      var h=leads.filter(function(l){return l.score>=80;}).length;
      var u=notifs.filter(function(n){return !n.read;}).length;
      callAI("Give a short 2-sentence welcome as Zentra AI. Mention "+h+" hot leads and "+u+" alerts. Be warm and energetic.",false);
    }
  }

  var QUICK=["What leads do we have?","Hot leads","Pipeline summary","Who is MS Dhoni?","Tell me a joke","Best sales tips","Motivate me","Pending followups"];

  return(
    <>
      <div className="ai-float">
        <button className="ai-btn" onClick={function(){open?setOpen(false):handleOpen();}}>
          <div className="ai-pulse"/>
          <span style={{fontSize:10,fontWeight:800,color:"#020B10"}}>{open?"X":"AI"}</span>
          {!open&&unread>0&&(
            <div style={{position:"absolute",top:-2,right:-2,width:18,height:18,borderRadius:"50%",background:"#F87171",border:"2px solid #060810",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#fff"}}>{unread}</div>
          )}
        </button>
      </div>

      {open&&(
        <div className="ai-panel">
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#6EE7F7,#F0C060)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:800,color:"#020B10",flexShrink:0}}>Z</div>
            <div style={{flex:1}}>
              <div className="syne" style={{fontWeight:700,fontSize:13}}>Zentra AI</div>
              <div style={{fontSize:10,color:"#34D399"}}>Live -- Ask me anything</div>
            </div>
            <div style={{display:"flex",gap:4}}>
              {["chat","voice","alerts"].map(function(t){
                return(
                  <button key={t} onClick={function(){setTab(t);if(t==="alerts")setNotifs(function(n){return n.map(function(x){return Object.assign({},x,{read:true});});});}} style={{padding:"3px 8px",borderRadius:8,fontSize:10,background:tab===t?"#0D2830":"none",border:"1px solid "+(tab===t?"#6EE7F7":"#1F2937"),color:tab===t?"#6EE7F7":"#6B7280",cursor:"pointer",position:"relative",textTransform:"capitalize"}}>
                    {t}
                    {t==="alerts"&&unread>0&&(
                      <span style={{position:"absolute",top:-4,right:-4,width:12,height:12,borderRadius:"50%",background:"#F87171",fontSize:7,fontWeight:700,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center"}}>{unread}</span>
                    )}
                  </button>
                );
              })}
            </div>
            <button onClick={function(){setOpen(false);window.speechSynthesis&&window.speechSynthesis.cancel();}} style={{background:"none",border:"none",color:"#6B7280",cursor:"pointer",fontSize:14,marginLeft:2}}>X</button>
          </div>

          {tab==="chat"&&(
            <>
              <div style={{maxHeight:200,overflowY:"auto",marginBottom:8,display:"flex",flexDirection:"column",gap:6}}>
                {msgs.length===0&&(
                  <div style={{fontSize:12,color:"#6B7280",textAlign:"center",padding:"12px 0"}}>Ask me anything -- leads, cricket, business, life, jokes...</div>
                )}
                {msgs.map(function(m){
                  return(
                    <div key={m.id} style={{alignSelf:m.from==="user"?"flex-end":"flex-start",background:m.from==="user"?"#0D2830":"#111827",border:"1px solid "+(m.from==="user"?"#6EE7F7":"#1F2937"),borderRadius:m.from==="user"?"14px 14px 4px 14px":"14px 14px 14px 4px",padding:"8px 12px",fontSize:12,maxWidth:"85%",lineHeight:1.6,color:m.from==="user"?"#6EE7F7":"#F0F4FF"}}>
                      {m.text}
                    </div>
                  );
                })}
                {typing&&(
                  <div style={{alignSelf:"flex-start",background:"#111827",border:"1px solid #1F2937",borderRadius:"14px 14px 14px 4px",padding:"10px 14px",display:"flex",alignItems:"center",gap:6}}>
                    {[0,1,2].map(function(i){return <div key={i} style={{width:5,height:5,borderRadius:"50%",background:"#6EE7F7",animation:"pulse 1s ease infinite",animationDelay:(i*0.2)+"s"}}/>;}) }
                    <span style={{fontSize:10,color:"#6B7280"}}>Zentra is thinking...</span>

function AICallModal(props){

  var [manualOutcome,setManualOutcome]=useState(null);

  useEffect(function(){
    var t1=setTimeout(function(){setPhase("ringing");setLog([" Dialler opened -- calling "+lead.phone," Ringing..."]);},900);
    var t2=setTimeout(function(){
      setPhase("connected");
      setLog(function(l){return l.concat([" Call connected -- starting qualification"]);});
      timerRef.current=setInterval(function(){setElapsed(function(e){return e+1;});},1000);
    },3500);
    var t3=setTimeout(function(){
      setLog(function(l){return l.concat([" AI: Hello "+lead.name.split(" ")[0]+"! Calling from your business. Is this a good time?"," AI: What exactly are you looking for? What is your budget? And your timeline?"]);});
      setPhase("qualifying");
    },5000);

  },[]);

              {(phase==="connected"||phase==="talking")&&(

    ?[{a:" AI Call now",d:"Calling "+lead.phone+" immediately",type:"call"},

    :[{a:" WhatsApp re-engagement",d:"Friendly check-in message",type:"whatsapp"},

    PLAN.forEach(function(p,i){ if(doneSteps.indexOf(i)===-1){ setTimeout(function(){runStep(i);}, i*1200); } });

  var allDone=doneSteps.length===PLAN.length;

          return (
            <button
              key={i}
              onClick={function(){runStep(i);}}
              disabled={isDone||runningStep!==null}
              style={{
                width:"100%",display:"flex",gap:12,alignItems:"flex-start",textAlign:"left",
                padding:"10px 8px",borderBottom:i<PLAN.length-1?"1px solid #1F2937":"none",

                {isDone?"✓":isRunning?"…":i+1}
              </div>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:isDone?"#34D399":"#F0F4FF"}}>{p.a}{isRunning?" — sending...":isDone?" — done":""}</div>
                <div style={{fontSize:11,color:"#6B7280",marginTop:2}}>{p.d}</div>
              </div>

          );
        })}

            <button className="btn-primary" onClick={props.onClose}>Done</button>
          </div>
        ):(
          <>

            <button className="btn-ghost" onClick={props.onClose}>Close</button>
          </>
        )}
      </div>
    </div>
  );
}

// ADVANCED LEAD SCORING (weighs stated budget/timeline against consistency, not just face value)
function parseBudgetLakhs(budget){
  if(!budget) return null;
  var s=String(budget).toLowerCase().replace(/rs\.?|inr|,/g,"").trim();
  var num=parseFloat((s.match(/[\d.]+/)||[])[0]);
  if(isNaN(num)) return null;
  if(s.indexOf("crore")>-1||s.indexOf("cr")>-1) return num*100;
  if(s.indexOf("lakh")>-1||s.indexOf("l")>-1) return num;
  if(s.indexOf("k")>-1) return num/100;
  return num>100000?num/100000:num; // assume raw rupees if large, else already lakhs
}
function timelineUrgency(timeline){
  var t=(timeline||"").toLowerCase();
  if(!t) return "unknown";
  if(/immediat|urgent|asap|this week|today|ready to buy|1 week/.test(t)) return "urgent";
  if(/1 month|2 month|30 days|this month/.test(t)) return "soon";
  if(/3 month|6 month|quarter/.test(t)) return "moderate";
  if(/not sure|just look|just explor|just check|no rush|someday|later/.test(t)) return "vague";
  return "moderate";
}
function computeAdvancedScore(form){
  var lakhs=parseBudgetLakhs(form.budget);
  var urgency=timelineUrgency(form.timeline);
  var reqLen=(form.requirement||"").trim().length;
  var score=45;
  var notes=[];

  if(lakhs===null){ notes.push("No clear budget figure given -- treated as unverified."); score-=8; }
  else if(lakhs>=100){ score+=10; }
  else if(lakhs>=25){ score+=6; }
  else { score+=2; }

  if(urgency==="urgent"){ score+=18; }
  else if(urgency==="soon"){ score+=10; }
  else if(urgency==="moderate"){ score+=2; }
  else if(urgency==="vague"){ score-=12; notes.push("Timeline sounds non-committal (\u201cjust exploring\u201d type language) -- often correlates with lower real intent."); }

  // The core "tone vs. affordability" heuristic: high stated budget + vague timeline is a classic
  // overstatement pattern -- people quote a big number to sound serious but hesitate the moment
  // EMI/payment terms come up.
  var overstatementRisk=false;
  if(lakhs!==null&&lakhs>=75&&(urgency==="vague"||urgency==="moderate")){
    overstatementRisk=true;
    score-=18;
    notes.push("Stated budget is high relative to a hesitant timeline -- a common sign the number was rounded up rather than confirmed. Recommend verifying payment mode (upfront vs EMI) before investing heavy follow-up time.");
  }
  if(lakhs!==null&&lakhs<15&&urgency==="urgent"){
    score+=8;
    notes.push("Modest, specific budget paired with urgency reads as a genuine, ready-to-move buyer.");
  }

  if(reqLen>25){ score+=6; } else if(reqLen>0&&reqLen<=8){ score-=4; notes.push("Requirement was answered in just a word or two -- low engagement in the conversation."); }

  score=Math.max(8,Math.min(96,Math.round(score+ (Math.random()*6-3))));

  var result=score>=70?"Qualified":score>=45?"Appointment":score>=20?"Budget Issue":"Fake";
  if(overstatementRisk&&result==="Qualified") result="Appointment"; // downgrade verdict when overstatement risk flagged, regardless of raw number
  var reason=notes.length?notes.join(" "):"Budget and timeline given match up consistently with a " +(score>=70?"strong":"workable")+ " level of intent.";

  return {score:score,result:result,reason:reason,overstatementRisk:overstatementRisk,urgency:urgency,lakhs:lakhs};
}
